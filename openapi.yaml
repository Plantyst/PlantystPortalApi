                  From: "2026-06-30T22:00:00Z"
                  To: "2026-07-01T19:59:59Z"
      responses:
        "200":
          description: The metadocuments with related users.
          content:
            application/hal+json:
              schema:
                type: object
                properties:
                  responseContinuation:
