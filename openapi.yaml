  /Metadocuments/{guid}:
    parameters:
      - name: guid
        in: path
        required: true
        schema:
          type: string
          format: uuid
        example: e2dd39dc-5389-43b9-b855-426af762811f
        description: Unique identifier of the metadocument.
    get:
      operationId: getMetadocument
      tags: [Metadocuments]
      summary: Get Metadocument
      description: |
        Gets the metadocument with the specific Guid, with embedded comments, production entries and related users.

        Required access right: _View_.
      responses:
        "200":
          description: The metadocument with embedded related resources.
          content:
            application/hal+json:
              schema:
                $ref: "#/components/schemas/Metadocument"
              example:
                guid: 27a858a0-c244-4640-83f8-513dbc70c2e6
                type: 3
                creatorId: 497
                measurementId: 3
                from: "2026-07-01T05:30:00Z"
                to: "2026-07-01T07:30:00Z"
                color: "#969614"
                downtimeCode: "144"
                downtimeCodeKey: "144"
                eTag: "\"2f007274-0000-0d00-0000-6a4e18d80000\""
                customFields:
                  SourceId: ext-123
                lastModified: "2026-07-01T09:25:15Z"
                _links:
                  self:
                    href: /Api/Metadocuments/27a858a0-c244-4640-83f8-513dbc70c2e6
                  user:
                    href: /Api/Users/497
                _embedded:
                  comment:
                    - id: 1
                      text: Comment text
                      modificationTime: "2026-07-01T11:52:12Z"
                      _links:
                        self:
                          href: /Api/Metadocuments/27a858a0-c244-4640-83f8-513dbc70c2e6/Comments/1/
                        user:
                          href: /Api/Users/497
                  productionEntry:
                    - id: 1
                      time: "2026-07-01T07:00:00Z"
                      value: 120
                      type: OK
                      note: First batch
                      _links:
                        self:
                          href: /Api/Metadocuments/27a858a0-c244-4640-83f8-513dbc70c2e6/ProductionEntries/1/
                        user:
                          href: /Api/Users/497
                  user:
                    - userId: 497
                      name: Martin Kouďa
                      _links:
                        self:
                          href: /Api/Users/497
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: patchMetadocument
      tags: [Metadocuments]
      summary: Patch Metadocument
      description: |
        Updates the metadocument with the specific Guid. Only the properties present in the payload are changed.

        Required access right: _Contributor_ (see the group description for `readOnly` and `locks` restrictions).

        The optional `ETag` property enables the optimistic concurrency check: when the metadocument has been modified in the meantime, the command finishes with the `Conflict` result. The server responds with `400 Bad Request` when the patch does not change anything or would leave the metadocument without content.
      parameters:
        - $ref: "#/components/parameters/CommandCustomId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MetadocumentUpdate"
            example:
              DowntimeCodeKey: "144"
              To: "2026-07-01T08:00:00Z"
              ETag: "\"2f007274-0000-0d00-0000-6a4e18d80000\""
      responses:
        "202":
          $ref: "#/components/responses/MetadocumentCommandAccepted"
        "400":
          description: The payload is invalid, does not change anything, or would leave the metadocument without content.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteMetadocument
      tags: [Metadocuments]
      summary: Delete Metadocument
      description: |
        Deletes the metadocument with the specific Guid.

        Required access right: _Contributor_ (see the group description for `readOnly` and `locks` restrictions).
      parameters:
        - name: etag
          in: query
          required: false
          schema:
            type: string
          description: Optional ETag of the metadocument for the optimistic concurrency check.
        - $ref: "#/components/parameters/CommandCustomId"
      responses:
        "202":
          $ref: "#/components/responses/MetadocumentCommandAccepted"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /Metadocuments/{guid}/Comments:
    parameters:
      - name: guid
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Unique identifier of the metadocument.
    post:
      operationId: addMetadocumentComment
      tags: [Metadocuments]
      summary: Add Metadocument Comment
      description: |
        Adds a comment to the specific metadocument.

        Required access right: _Contributor_.
      parameters:
        - $ref: "#/components/parameters/CommandCustomId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [Text]
              properties:
                Text:
                  type: string
                  maxLength: 500
                  description: The comment text.
                Time:
                  type: string
                  format: date-time
                  description: The comment time; when omitted, the current UTC time is used.
            example:
              Text: Comment text.
      responses:
        "202":
          $ref: "#/components/responses/MetadocumentCommandAccepted"
        "400":
          description: The payload is invalid (`Text` is required, at most 500 characters).
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: patchMetadocumentComment
      tags: [Metadocuments]
      summary: Patch Metadocument Comment
      description: |
        Updates the comment with the specific `Id` of the given metadocument.

        Required access right: _Contributor_; only the author of the comment can update it.

        __Note:__ Updating a comment assigns it a new `id` (the `id` identifies the comment and its version). Re-read the metadocument to get the current `id` before a subsequent update or delete.
      parameters:
        - $ref: "#/components/parameters/CommandCustomId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [Id, Text]
              properties:
                Id:
                  type: integer
                  description: The identifier of the comment within the metadocument.
                Text:
                  type: string
                  maxLength: 500
                  description: The new comment text.
                Time:
                  type: string
                  format: date-time
                  description: The comment time; when omitted, the current UTC time is used.
            example:
              Id: 12
              Text: Comment text.
      responses:
        "202":
          $ref: "#/components/responses/MetadocumentCommandAccepted"
        "400":
          description: The payload is invalid (`Text` is required, at most 500 characters).
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /Metadocuments/{guid}/Comments/{id}:
    delete:
      operationId: deleteMetadocumentComment
      tags: [Metadocuments]
      summary: Delete Metadocument Comment
      description: |
        Deletes the comment of the specific metadocument. When the metadocument has no other content, it is deleted as well.

        Required access right: _Contributor_; deleting another user's comment requires the _Admin_ right.
      parameters:
        - name: guid
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Unique identifier of the metadocument.
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: The identifier of the comment within the metadocument.
        - $ref: "#/components/parameters/CommandCustomId"
      responses:
        "202":
          $ref: "#/components/responses/MetadocumentCommandAccepted"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /Metadocuments/{guid}/ProductionEntries:
    parameters:
      - name: guid
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Unique identifier of the metadocument.
    post:
      operationId: addProductionEntry
      tags: [Metadocuments]
      summary: Add Production Entry
      description: |
        Adds a production entry (produced amount record) into the metadocument.

        Required access right: _Contributor_.

        When the production entries of the metadocument are managed by a linked external source, the server responds with `405 Method Not Allowed`.
      parameters:
        - $ref: "#/components/parameters/CommandCustomId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductionEntryCreate"
            example:
              Value: 120
              Type: OK
              Time: "2026-07-01T07:00:00Z"
      responses:
        "202":
          $ref: "#/components/responses/MetadocumentCommandAccepted"
        "400":
          description: The payload is invalid.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "405":
          description: The production entries of the metadocument are managed by a linked external source and cannot be modified directly.
    patch:
      operationId: patchProductionEntry
      tags: [Metadocuments]
      summary: Patch Production Entry
      description: |
        Updates the production entry with the specific `Id` of the given metadocument. The entry is replaced as a whole - provide all its properties, including `Time` (when `Time` is omitted, the current UTC time is used, which fails with the `DataError` result for metadocuments in the past).

        Required access right: _Contributor_.

        __Note:__ Updating a production entry assigns it a new `id` (the `id` identifies the entry and its version). Re-read the metadocument to get the current `id` before a subsequent update or delete.
      parameters:
        - $ref: "#/components/parameters/CommandCustomId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required: [Id]
                  properties:
                    Id:
                      type: integer
                      description: The identifier of the production entry within the metadocument.
                - $ref: "#/components/schemas/ProductionEntryCreate"
            example:
              Id: 1
              Value: 150
              Type: OK
      responses:
        "202":
          $ref: "#/components/responses/MetadocumentCommandAccepted"
        "400":
          description: The payload is invalid.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "405":
          description: The production entries of the metadocument are managed by a linked external source and cannot be modified directly.

  /Metadocuments/{guid}/ProductionEntries/{id}:
    delete:
      operationId: deleteProductionEntry
      tags: [Metadocuments]
      summary: Delete Production Entry
      description: |
        Deletes the production entry of the specific metadocument. When the metadocument has no other content, it is deleted as well.

        Required access right: _Contributor_.
      parameters:
        - name: guid
          in: path
