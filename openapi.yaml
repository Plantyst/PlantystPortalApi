  /MetadocumentHistoryLogsQuery:
    post:
      operationId: queryMetadocumentHistoryLogs
      tags: [Metadocuments]
      summary: Query metadocument change history
      description: |
        Returns the audit log of the metadocument changes of the given measurements - one record per processed metadocument command, with the applied changes expressed as a JSON Patch (RFC 6902) document. The time range of a query selects the records by the time the change was processed (`processedDate`).

        Reading the `appliedChanges` patches:

        * the property paths use the PascalCase names of the internal model (e.g. `/To`, `/Comments/0`) - the same convention as the `appliedChanges` of the webhook events (see Webhooks)
        * a created metadocument appears as a `replace` of the root path `/` with the full document as the value
        * a deleted metadocument appears as a `replace` of the root path `/` with a `null` value

        Required access right: _View_ (for all queried measurements, otherwise `403 Forbidden`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Queries:
                  type: array
                  items:
                    type: object
                    required: [MeasurementId, From, To]
                    properties:
                      MeasurementId:
                        type: integer
                      From:
                        type: string
                        format: date-time
                      To:
                        type: string
                        format: date-time
            example:
              Queries:
                - MeasurementId: 3
                  From: "2026-07-10T00:00:00Z"
                  To: "2026-07-12T23:59:59Z"
      responses:
        "200":
          description: The change history records, one result per query, ordered from the most recent change.
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        query:
                          type: object
                          properties:
                            measurementId:
                              type: integer
                            from:
                              type: string
                              format: date-time
                            to:
                              type: string
                              format: date-time
                        result:
                          type: array
                          items:
                            type: object
                            properties:
                              guid:
                                type: string
                                format: uuid
                                description: The identifier of the processed command.
                              metadocumentGuid:
                                type: string
                                format: uuid
                                description: The identifier of the changed metadocument.
                              appliedChanges:
                                type: string
                                description: The JSON Patch (RFC 6902) document with the applied changes, serialized as a string.
                              originFrom:
                                type: [string, "null"]
                                format: date-time
                                description: The `from` of the metadocument before the change, when the operation carried the range; `null` otherwise.
                              originTo:
                                type: [string, "null"]
                                format: date-time
                                description: The `to` of the metadocument before the change, when the operation carried the range; `null` otherwise.
                              processedDate:
                                type: string
                                format: date-time
                                description: The time the change was processed.
                              eTag:
                                type: string
                                description: The `eTag` of the metadocument after the change.
                              application:
                                type: [string, "null"]
                                description: The name of the client application that made the change; `null` when the change was made by a user in the Portal or with a plain API call.
              example:
                results:
                  - query:
                      measurementId: 3
                      from: "2026-07-10T00:00:00Z"
                      to: "2026-07-12T23:59:59Z"
                    result:
                      - guid: 2ba0b8f7-2593-4399-9cd4-02f8b5760811
                        appliedChanges: '[{"op":"replace","path":"/To","value":"2026-07-10T17:00:00Z"}]'
                        originFrom: "2026-07-10T16:00:00Z"
                        originTo: "2026-07-10T16:30:00Z"
                        processedDate: "2026-07-11T19:06:50.246Z"
                        eTag: '"5e00d153-0000-0d00-0000-6a52944a0000"'
                        application: null
                        metadocumentGuid: b6b6fc8d-4733-48b3-a927-e0e97baedbc5
                      - guid: a979f032-e75c-4a98-870a-3e3c7b0e3345
                        appliedChanges: '[{"op":"add","path":"/Color","value":"46, 204, 113"}]'
                        originFrom: null
                        originTo: null
                        processedDate: "2026-07-11T19:06:47.425Z"
                        eTag: '"5e008e53-0000-0d00-0000-6a5294470000"'
                        application: Downtime color
                        metadocumentGuid: b6b6fc8d-4733-48b3-a927-e0e97baedbc5
        "400":
          description: The payload is invalid.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /MetadocumentAggregationsQuery:
    post:
      operationId: queryMetadocumentAggregations
      tags: [Metadocuments]
      summary: Query metadocument counts per interval
      description: |
        Returns the counts of the metadocuments per type in the given time intervals - e.g. "how many downtimes and jobs there were on each day of a week". Useful for overviews of long ranges without downloading the metadocuments themselves.

        The interval splitting is driven by `AggregationIntervals` - a text pattern of `<number><unit>` pairs with the units `y` (years), `M` (months), `w` (weeks), `d` (days), `h` (hours) and `m` (minutes). The pattern repeats from `From` until `To` is reached: `1d` produces daily buckets, `8h16h` alternating 8-hour and 16-hour buckets. When omitted, the whole range is a single interval.

        The `countPerType` of the result maps the metadocument type to the count in the interval; types with no match are omitted. At most 100 queries are accepted in one request.

        Required access right: _View_ (for all queried measurements, otherwise `403 Forbidden`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Queries:
                  type: array
                  maxItems: 100
                  items:
                    type: object
                    required: [MeasurementIds, From, To, RequestedTypes]
                    properties:
                      MeasurementIds:
                        type: array
                        items:
                          type: integer
                      From:
                        type: string
                        format: date-time
                      To:
                        type: string
                        format: date-time
                      AggregationIntervals:
                        type: [string, "null"]
                        description: "The interval pattern (see the description), e.g. `1d`; the whole range is one interval when omitted."
                      RequestedTypes:
                        type: array
                        description: The metadocument types to count (see the tag description).
                        items:
                          type: integer
                          enum: [0, 1, 2, 3]
            example:
              Queries:
                - MeasurementIds: [3]
                  From: "2026-07-09T00:00:00Z"
                  To: "2026-07-12T00:00:00Z"
                  AggregationIntervals: 1d
                  RequestedTypes: [2, 3]
      responses:
        "200":
          description: The counts per interval, in the order of the intervals.
          content:
            application/hal+json:
              schema:
                type: object
                properties:
                  _links:
                    $ref: "#/components/schemas/HalLinks"
                  _embedded:
                    type: object
                    properties:
                      metadocumentsAggregation:
                        type: array
                        items:
                          type: object
                          properties:
                            measurementId:
                              type: integer
                            from:
                              type: string
                              format: date-time
                            to:
                              type: string
                              format: date-time
                            countPerType:
                              type: object
                              description: The map of the metadocument type to the count of the metadocuments in the interval.
                              additionalProperties:
                                type: integer
                            _links:
                              $ref: "#/components/schemas/HalLinks"
              example:
                _links:
                  self:
                    href: /Api/MetadocumentAggregationsQuery/
                _embedded:
                  metadocumentsAggregation:
                    - measurementId: 3
                      from: "2026-07-09T00:00:00Z"
                      to: "2026-07-10T00:00:00Z"
                      countPerType:
                        "2": 2
                        "3": 11
                      _links:
                        self:
                          href: /Api/MetadocumentAggregationsQuery/
                    - measurementId: 3
                      from: "2026-07-10T00:00:00Z"
                      to: "2026-07-11T00:00:00Z"
                      countPerType:
                        "3": 10
                      _links:
                        self:
                          href: /Api/MetadocumentAggregationsQuery/
        "400":
          description: The payload is invalid - more than 100 queries, an invalid `AggregationIntervals` definition, or missing `RequestedTypes`.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /MetadocumentSplitCommands:
    post:
      operationId: splitMetadocument
      tags: [Metadocuments]
      summary: Split metadocument
      description: |
        Splits a time-range metadocument into two at the given `SplitDate`: the original metadocument is truncated to end at `SplitDate`, and a new metadocument (with a new `guid`) is created covering the range from `SplitDate` to the original end. A typical use is splitting a downtime into two differently classified parts, or splitting a job at a shift boundary.

        * `KeepContent: true` copies the document properties (title, downtime code, custom fields, ...) to the new metadocument; otherwise the new document is created empty.
        * `KeepComments: true` copies the comments to the new metadocument.

        The `SplitDate` must lie strictly inside the metadocument range (greater than `from`, lower than `to`), otherwise the request fails with `400 Bad Request`.

        Required access right: _Contributor_ (the same rules as updating the metadocument).
      parameters:
        - $ref: "#/components/parameters/CommandCustomId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [Guid, SplitDate]
              properties:
                MeasurementId:
                  type: integer
                Guid:
                  type: string
                  format: uuid
                  description: The identifier of the metadocument to split.
                SplitDate:
                  type: string
                  format: date-time
                  description: The time point to split the metadocument at; must lie strictly inside the metadocument range.
                ETag:
                  type: string
                  description: The optional ETag for the optimistic concurrency check.
                KeepContent:
                  type: boolean
                  description: Copy the document properties to the new metadocument.
                KeepComments:
                  type: boolean
                  description: Copy the comments to the new metadocument.
            example:
              MeasurementId: 3
              Guid: ee9c664a-3a3b-4183-92b0-77b12ee7b945
              SplitDate: "2026-07-12T02:30:00Z"
              KeepContent: true
              KeepComments: true
      responses:
        "202":
          $ref: "#/components/responses/MetadocumentCommandAccepted"
        "400":
          description: The `SplitDate` does not lie inside the metadocument range.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: The metadocument does not exist.

  # Internal-only endpoints, intentionally not documented (the multiple
  # instances of jobs are for internal use for now):
  # * POST Api/MetadocumentLinkAddCommands - create a job metadocument linked to
  #   a multiple instance ({Metadocument: <same as POST /Metadocuments>, Link:
  #   {LinkId, LinkType: MultipleInstance|ProductionEntries|Changeover,
  #   Configuration?}}; 202 HAL {location, _links.metadocumentLink + _links.
  #   metadocument} = three command results)
  # * POST Api/MetadocumentCompleteCommands - complete a running instance
  #   ({MetadocumentGuid, CompletedDate, OriginGuid = the current commandGuid of
  #   the instance, ETag?}; sets the metadocument `to` and marks the instance
  #   completed; 400 when the link/instance is missing, already completed, or
  #   the OriginGuid is stale)
  # * POST Api/MultipleInstances - query the instance states (body = JSON array
  #   of multipleInstanceId values; returns {id, completedDate?, commandGuid})

  /ProductionEntriesImportCommands:
    post:
      operationId: importProductionEntries
      tags: [Metadocuments]
      summary: Import NOK production records (CSV)
      description: |
        Imports NOK (non-conforming pieces) production records from a CSV file and attaches them to the job metadocuments matched by the work order number. Exactly one file is expected as a multipart content. The import is asynchronous (`202 Accepted` + `location` of the command result at the generic `api/commandResults/{id}`).

        __File format__

        * UTF-8 encoding (optional BOM); the delimiter `,` or `;` is auto-detected from the header row and must be used consistently
        * a header row with the columns (names are case-insensitive): `MeasurementId`, `WorkOrderNumber`, `TimeStamp`, `Value`
        * every row must fill all four columns

        __Matching rules__ (a violating row is skipped and reported):

        * exactly one job metadocument with the row's `WorkOrderNumber` must exist on the measurement
        * all timestamps of a work order must lie within the time range of the matched job
        * the job must not already contain manually created production entries
        * the user must have access to every `MeasurementId` referenced by the file

        __Effects__

        * the imported records are attached to the job as one batch: the job receives a `links` item of type `ProductionEntries`, and the manual production-entry operations (`POST`/`PATCH`/`DELETE .../ProductionEntries`) respond with `405 Method Not Allowed` for it from then on
        * the records enter the analytics as NOK quantities (e.g. the `nok` and `Quality` metrics of `/MeasurementMetricsQuery2`); they are not returned in the `productionEntries` array of the metadocument
        * a repeated import of the same work order replaces the previously imported batch

        __Command result__

        * `Success` - all rows were imported
        * `Failed` with the reason `Imported X rows from Y.` - some rows were skipped (see the matching rules)
        * `DataError` - the file could not be parsed at all (wrong encoding, unrecognized delimiter, missing column)

        __Configuration__

        The CSV parsing can be customized per customer account on request - contact the Plantyst support. Configurable options: the time zone the timestamps are interpreted in, the culture used for parsing dates and numbers, and custom column names mapped to the expected ones. (The job plan import supports the same time zone and culture configuration - see `/JobTypesImportCommands`.)
      parameters:
        - $ref: "#/components/parameters/CommandCustomId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  contentMediaType: text/csv
                  description: |
                    The CSV file with the NOK records (UTF-8, comma or semicolon separated, with a header row). Send exactly one file part; the form field name is not significant. Example:

                    ```
                    MeasurementId,WorkOrderNumber,TimeStamp,Value
                    3,WO-42,2026-07-12T04:15:00Z,5
                    3,WO-42,2026-07-12T04:45:00Z,3
                    ```
      responses:
        "202":
          $ref: "#/components/responses/CommandAccepted"
        "400":
          description: The multipart data are invalid or more than one file was uploaded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
              example:
                Message: Only single file upload is supported.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: The user has no customer account (subscription).
        "415":
          description: The request content is not a MIME multipart content.

  # ---------------------------------------------------------------------------
  # Tasks
  # ---------------------------------------------------------------------------
  /TaskEntries:
    get:
      operationId: getTaskEntries
      tags: [Tasks (Beta)]
      summary: List tasks (Beta)
      description: |
        Returns the tasks of the customer account of the user, together with the users and the metadocuments they belong to (in `_embedded`). With `fromCompletedDate`, the completed tasks are limited to those completed at or after the given time (open tasks are always included); without it, the whole task history is returned.

        __Known issue:__ on accounts with a longer task history, the call without `fromCompletedDate` may currently fail with `500 Internal Server Error`. Always pass `fromCompletedDate` - it also keeps the response reasonably small.

        Required access right: _View_ (tasks of inaccessible measurements are omitted).
      parameters:
        - name: fromCompletedDate
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Include only the tasks completed at or after this time (open tasks are always included).
      responses:
        "200":
          description: The tasks with the related users and metadocuments.
          content:
            application/hal+json:
              schema:
                $ref: "#/components/schemas/TaskEntryList"
              example:
                _links:
                  self:
                    href: /Api/TaskEntries
                _embedded:
                  taskEntry:
                    - id: 332011b2-f82f-4b05-afb5-a55cc6e71418
                      title: Check the tooling
                      metadocumentGuid: 112e6ba3-5857-4fde-b22a-b6a0c2c9de54
                      commandGuid: f2af1aaf-2b2b-432e-99a5-fd8be1fb1389
                      createdDate: "2026-07-12T10:54:03Z"
                      dueDate: "2026-07-13T06:00:00Z"
                      deadline: "2026-07-14T06:00:00Z"
                      _links:
                        self:
                          href: /Api/TaskEntries/332011b2-f82f-4b05-afb5-a55cc6e71418
                        metadocument:
                          href: /Api/Metadocuments/112e6ba3-5857-4fde-b22a-b6a0c2c9de54
                  user:
                    - userId: 92
                      name: Jan Novák
                      _links:
                        self:
                          href: /Api/Users/92
                  metadocument:
                    - guid: 112e6ba3-5857-4fde-b22a-b6a0c2c9de54
                      type: 2
                      title: Work order 42
                      measurementId: 3
                      from: "2026-07-12T08:00:00Z"
                      to: "2026-07-12T09:00:00Z"
                      task:
                        id: 332011b2-f82f-4b05-afb5-a55cc6e71418
                        initialTitle: Check the tooling
                      _links:
                        self:
                          href: /Api/Metadocuments/112e6ba3-5857-4fde-b22a-b6a0c2c9de54
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: getTaskEntriesByIds
      tags: [Tasks (Beta)]
      summary: Get tasks by identifiers (Beta)
      description: |
        Returns the given tasks (the body is a plain JSON array of the task identifiers), in the same shape as the task list.

        Required access right: _View_ (of the measurements of all requested tasks).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: string
            example: ["332011b2-f82f-4b05-afb5-a55cc6e71418"]
      responses:
        "200":
          description: The tasks with the related users and metadocuments, in the same HAL representation as `GET /TaskEntries`.
          content:
            application/hal+json:
              schema:
                $ref: "#/components/schemas/TaskEntryList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Some of the tasks are not accessible to the user.
        "404":
          description: Some of the identifiers do not exist.

  /TaskEntries/{id}:
    get:
      operationId: getTaskEntry
      tags: [Tasks (Beta)]
      summary: Get task (Beta)
      description: |
        Returns the task with the embedded users and metadocument.

        Required access right: _View_ (of the measurement of the task).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The task.
          content:
            application/hal+json:
              schema:
                $ref: "#/components/schemas/TaskEntry"
              example:
                id: 332011b2-f82f-4b05-afb5-a55cc6e71418
                title: Check the tooling
                metadocumentGuid: 112e6ba3-5857-4fde-b22a-b6a0c2c9de54
                commandGuid: f2af1aaf-2b2b-432e-99a5-fd8be1fb1389
                createdDate: "2026-07-12T10:54:03Z"
                dueDate: "2026-07-13T06:00:00Z"
                deadline: "2026-07-14T06:00:00Z"
                _links:
                  self:
                    href: /Api/TaskEntries/332011b2-f82f-4b05-afb5-a55cc6e71418
                  metadocument:
                    href: /Api/Metadocuments/112e6ba3-5857-4fde-b22a-b6a0c2c9de54
                _embedded:
                  user:
                    - userId: 92
                      name: Jan Novák
                      _links:
                        self:
                          href: /Api/Users/92
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: The task does not exist.

  /TaskEntryAddCommands:
    post:
      operationId: addTaskEntry
      tags: [Tasks (Beta)]
      summary: Create task (Beta)
      description: |
        Creates a task attached to the given metadocument. The operation is an asynchronous command (`202 Accepted` + `location` of the command result).

        Required access right: _Contributor_ (of the measurement of the metadocument); the measurement must belong to the current customer account of the user, otherwise `400 Bad Request`.
      parameters:
        - $ref: "#/components/parameters/CommandCustomId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [Title, MetadocumentGuid]
              properties:
                Title:
                  type: string
                  description: The description of the task; must not be empty.
                MetadocumentGuid:
                  type: string
                  format: uuid
                DueDate:
                  type: [string, "null"]
                  format: date-time
                  description: The planned date of the task.
                Deadline:
                  type: [string, "null"]
                  format: date-time
                  description: The latest date the task should be finished.
            example:
              Title: Check the tooling
              MetadocumentGuid: 112e6ba3-5857-4fde-b22a-b6a0c2c9de54
              DueDate: "2026-07-13T06:00:00Z"
              Deadline: "2026-07-14T06:00:00Z"
      responses:
        "202":
          $ref: "#/components/responses/CommandAccepted"
        "400":
          description: The `Title` or `MetadocumentGuid` is missing, or the measurement does not belong to the current customer account of the user.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: The metadocument does not exist or the user does not have the Contributor right.

  /TaskEntryUpdateCommands:
    post:
      operationId: updateTaskEntry
      tags: [Tasks (Beta)]
      summary: Update task (Beta)
      description: |
        Updates the task. Only the properties present in the payload are changed (merge semantics):

        * `State: Completed` completes the task (sets its `completedDate` and the completing user; an already completed task keeps the original values), `State: Open` re-opens it
        * `Title` can be changed but not emptied (`400 Bad Request`)
        * `DueDate` and `Deadline` can be set or cleared with `null`

        `OriginGuid` must be the current `commandGuid` of the task - every change assigns a new value, so re-read the task before a subsequent change.

        Required access right: _Contributor_; the measurement must belong to the current customer account of the user.
      parameters:
        - $ref: "#/components/parameters/CommandCustomId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [Id, OriginGuid]
              properties:
                Id:
                  type: string
                OriginGuid:
                  type: string
                  format: uuid
                  description: The current `commandGuid` of the task.
                Title:
                  type: string
                State:
                  type: string
                  enum: [Completed, Open]
                DueDate:
                  type: [string, "null"]
                  format: date-time
                Deadline:
                  type: [string, "null"]
                  format: date-time
            example:
              Id: 332011b2-f82f-4b05-afb5-a55cc6e71418
              OriginGuid: f2af1aaf-2b2b-432e-99a5-fd8be1fb1389
              State: Completed
      responses:
        "202":
          $ref: "#/components/responses/CommandAccepted"
        "400":
          description: The `Id` or `OriginGuid` is missing, the `State` is invalid, the `Title` would become empty, or the measurement does not belong to the current customer account.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: The task does not exist (or is deleted), or the user does not have the Contributor right.

  /TaskEntryDeleteCommands:
    post:
      operationId: deleteTaskEntry
      tags: [Tasks (Beta)]
      summary: Delete task (Beta)
      description: |
        Deletes the task (a soft delete - the task disappears from the lists).

        __Known issue:__ the delete command currently fails with `500 Internal Server Error`; until it is fixed, close tasks by completing them (`/TaskEntryUpdateCommands` with `State: Completed`).

        Required access right: _Contributor_; the measurement must belong to the current customer account of the user.
      parameters:
        - $ref: "#/components/parameters/CommandCustomId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [Id, OriginGuid]
              properties:
                Id:
                  type: string
                OriginGuid:
                  type: string
                  format: uuid
                  description: The current `commandGuid` of the task.
            example:
              Id: 332011b2-f82f-4b05-afb5-a55cc6e71418
              OriginGuid: f2af1aaf-2b2b-432e-99a5-fd8be1fb1389
      responses:
        "202":
          $ref: "#/components/responses/CommandAccepted"
        "400":
          description: The `Id` or `OriginGuid` is missing, or the measurement does not belong to the current customer account.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: The task does not exist (or is already deleted), or the user does not have the Contributor right.

  # ---------------------------------------------------------------------------
  # Downtime Codes
  # ---------------------------------------------------------------------------
  /DowntimeDictionary:
    get:
      operationId: getDowntimeDictionary
      tags: [Downtime Codes Dictionary]
      summary: Get downtime code dictionary
      description: |
        Gets the downtime code dictionary for the given set of measurements. The response embeds two collections:

        * `downtimeCode` - the downtime codes themselves
        * `measurementDowntimeCode` - the mapping of measurements to their downtime codes (as links)

        Deleted codes are included with a non-null `validTo`; treat them as historical (they may still be referenced by past downtimes).

        Required access right: _View_ (for all queried measurements, otherwise `403 Forbidden`).
      parameters:
        - name: ids
          in: query
          required: true
          style: form
          explode: true
          schema:
            type: array
            items:
              type: integer
          description: The measurement identifiers (repeat the parameter for multiple measurements, e.g. `?ids=3&ids=4`).
        - name: culture
          in: query
          required: true
          schema:
            type: string
          example: en-US
          description: The culture identifier (e.g. `en-US`). Reserved for future localization of the dictionary; currently it does not affect the response content. Always provide it - requests without `culture` are served by a legacy variant of the endpoint with a different, obsolete response shape.
      responses:
        "200":
          description: The downtime code dictionary.
          content:
            application/hal+json:
              schema:
                type: object
                properties:
                  _links:
                    $ref: "#/components/schemas/HalLinks"
                  _embedded:
                    type: object
                    properties:
                      downtimeCode:
                        type: array
                        items:
                          $ref: "#/components/schemas/DowntimeCode"
                      measurementDowntimeCode:
                        type: array
                        items:
                          type: object
                          properties:
                            measurementId:
                              type: integer
                            _links:
                              $ref: "#/components/schemas/HalLinks"
              example:
                _links:
                  self:
                    href: /Api/DowntimeDictionary
                _embedded:
                  downtimeCode:
                    - downtimeCodeId: 9561
                      key: "144"
                      code: "1.2"
                      title: Tool change
                      color: "#E67E22"
                      commandGuid: bbf8dc05-0735-43b3-a2fb-6406bda5097f
                      canBeSelected: true
                      isCommentRequired: true
                      maxLength: 3600
                      _links:
                        self:
                          href: /Api/DowntimeCode/9561
                    - downtimeCodeId: 9562
                      key: "145"
                      code: "2"
                      title: Breakdown
                      isBreakdown: true
                      validTo: "2025-06-05T08:27:27.547Z"
                      commandGuid: c1f8dc05-0735-43b3-a2fb-6406bda5097f
                      canBeSelected: false
                      _links:
                        self:
                          href: /Api/DowntimeCode/9562
                  measurementDowntimeCode:
                    - measurementId: 3
                      _links:
                        self:
                          href: /Api/Measurement/3/DowntimeCodes
                        downtimeCode:
                          - href: /Api/DowntimeCode/9561
                          - href: /Api/DowntimeCode/9562
        "400":
          description: The `ids` parameter is missing.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /DowntimeCodeAddCommands:
    post:
      operationId: addDowntimeCode
      tags: [Downtime Codes Dictionary]
      summary: Add downtime code
      description: |
        Creates a new downtime code on the given measurements.

        Required access right: _Admin_ (for all listed measurements).
      parameters:
        - $ref: "#/components/parameters/CommandCustomId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required: [MeasurementIds]
                  properties:
                    MeasurementIds:
                      type: array
                      items:
                        type: integer
                      description: The measurements on which the code is created.
                - $ref: "#/components/schemas/DowntimeCodeWrite"
            example:
              MeasurementIds: [3, 4]
              Code: "1.2"
              Title: Tool change
              Color: "#E67E22"
              CanBeSelected: true
              IsCommentRequired: true
              MaxLength: 3600
      responses:
        "202":
          $ref: "#/components/responses/CommandAccepted"
        "400":
          description: The payload is invalid (`Code` and `Title` are required; `Code` must match `^([a-zA-Z0-9]+\.?)+$` and be at most 10 characters long).
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /DowntimeCodeUpdateCommands:
    post:
      operationId: updateDowntimeCode
      tags: [Downtime Codes Dictionary]
      summary: Update downtime code
      description: |
        Updates the downtime code identified by `OriginGuids` and `DowntimeCodeIds`. Only the provided properties are changed - omitted optional properties keep their current values (`Code` and `Title` are required even when unchanged).

        Required access right: _Admin_.

        __Note:__ Every change of a code assigns it a new `commandGuid`. Re-read the dictionary to get the current `commandGuid` (used as `OriginGuids`) before a subsequent update, delete or restore; a command with a stale `OriginGuids` value finishes with the `Conflict` result.
      parameters:
        - $ref: "#/components/parameters/CommandCustomId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required: [OriginGuids, DowntimeCodeIds]
                  properties:
                    OriginGuids:
                      type: array
                      items:
                        type: string
                        format: uuid
                      description: The current `commandGuid` values of the codes to update (see the dictionary).
                    DowntimeCodeIds:
                      type: array
                      items:
                        type: integer
                      description: The `downtimeCodeId` values of the codes to update.
                - $ref: "#/components/schemas/DowntimeCodeWrite"
            example:
              OriginGuids: [bbf8dc05-0735-43b3-a2fb-6406bda5097f]
              DowntimeCodeIds: [9561]
              Code: "1.2"
              Title: Tool change (updated)
      responses:
        "202":
          $ref: "#/components/responses/CommandAccepted"
        "400":
          description: The payload is invalid (`Code` and `Title` are required even when unchanged).
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /DowntimeCodeDeleteCommands:
    post:
      operationId: deleteDowntimeCode
      tags: [Downtime Codes Dictionary]
      summary: Delete downtime code
      description: |
        Deletes (deactivates) the downtime codes identified by `OriginGuids` and `DowntimeCodeIds`. The delete is a soft delete - the code gets a `validTo` timestamp and stays in the dictionary for historical downtimes. It can be restored later.

        Required access right: _Admin_.
      parameters:
        - $ref: "#/components/parameters/CommandCustomId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [OriginGuids, DowntimeCodeIds]
              properties:
                OriginGuids:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: The current `commandGuid` values of the codes to delete.
                DowntimeCodeIds:
                  type: array
                  items:
                    type: integer
            example:
              OriginGuids: [bbf8dc05-0735-43b3-a2fb-6406bda5097f]
              DowntimeCodeIds: [9561]
      responses:
        "202":
          $ref: "#/components/responses/CommandAccepted"
        "400":
          description: The payload is invalid.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /DowntimeCodeRestoreCommands:
    post:
      operationId: restoreDowntimeCode
      tags: [Downtime Codes Dictionary]
      summary: Restore downtime code
      description: |
        Restores previously deleted downtime codes (clears their `validTo`).

        Required access right: _Admin_.
      parameters:
        - $ref: "#/components/parameters/CommandCustomId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [MeasurementIds, OriginGuids, DowntimeCodeIds]
              properties:
                MeasurementIds:
                  type: array
                  items:
                    type: integer
                OriginGuids:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: The current `commandGuid` values of the codes to restore.
                DowntimeCodeIds:
                  type: array
                  items:
                    type: integer
            example:
              MeasurementIds: [3]
              OriginGuids: [bbf8dc05-0735-43b3-a2fb-6406bda5097f]
              DowntimeCodeIds: [9561]
      responses:
        "202":
          $ref: "#/components/responses/CommandAccepted"
        "400":
          description: The payload is invalid.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /DowntimeCodeCopyCommands:
    post:
      operationId: copyDowntimeCodes
      tags: [Downtime Codes Dictionary]
      summary: Copy downtime codes between measurements
      description: |
        Copies downtime codes from the origin measurement to the target measurements. The `CopyAction` determines the behavior:

        * `CopyAll` - copies all selected codes of the origin measurement
        * `Merge` - adds only the codes missing on the target measurements (matched by `code`)
        * `Overwrite` - copies the codes and overwrites the conflicting ones on the target measurements

        Required access right: _Admin_ (for the target measurements).
      parameters:
        - $ref: "#/components/parameters/CommandCustomId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [MeasurementIds, OriginMeasurementId, CopyAction, OriginMeasurementGuids]
              properties:
                MeasurementIds:
                  type: array
                  items:
                    type: integer
                  description: The target measurements.
                OriginMeasurementId:
                  type: integer
                  description: The measurement to copy the codes from.
                CopyAction:
                  type: string
                  enum: [CopyAll, Merge, Overwrite]
                OriginMeasurementGuids:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: The `commandGuid` values of the origin measurement codes to copy.
            example:
              MeasurementIds: [4, 5]
              OriginMeasurementId: 3
              CopyAction: Merge
              OriginMeasurementGuids: [bbf8dc05-0735-43b3-a2fb-6406bda5097f]
      responses:
        "202":
          $ref: "#/components/responses/CommandAccepted"
        "400":
          description: The payload is invalid.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  # ---------------------------------------------------------------------------
  # Automatic Downtime Generation (historical name: downtime alarms)
  # ---------------------------------------------------------------------------
  /DowntimeAlarmAddCommands:
    post:
      operationId: addDowntimeAlarm
      tags: [Automatic Downtime Generation]
      summary: Enable automatic downtime generation
      description: |
        Enables the automatic downtime generation on the given measurements - creates a generation rule with the specified minimum stop length.

        Required access right: _Admin_.
      parameters:
        - $ref: "#/components/parameters/CommandCustomId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [MeasurementIds, TimeSpan]
              properties:
                MeasurementIds:
                  type: array
                  items:
                    type: integer
                TimeSpan:
                  type: string
                  description: The minimum stop length that triggers the automatic downtime creation, in the `hh:mm:ss` format.
            example:
              MeasurementIds: [3]
              TimeSpan: "00:05:00"
      responses:
        "202":
          $ref: "#/components/responses/CommandAccepted"
        "400":
          description: The payload is invalid.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /DowntimeAlarmUpdateCommands:
    post:
      operationId: updateDowntimeAlarm
      tags: [Automatic Downtime Generation]
      summary: Update automatic downtime generation rule
      description: |
        Updates the minimum stop length of the generation rules identified by `OriginGuids` and `ProductionAlarmTriggerIds`.

        Required access right: _Admin_.
      parameters:
        - $ref: "#/components/parameters/CommandCustomId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [OriginGuids, ProductionAlarmTriggerIds]
              properties:
                OriginGuids:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: The `commandGuid` values of the generation rules (assigned by the command that created or last changed them).
                ProductionAlarmTriggerIds:
                  type: array
                  items:
                    type: integer
                  description: The identifiers of the generation rules (historically "production alarm triggers").
                TimeSpan:
                  type: string
                  description: The new minimum stop length, in the `hh:mm:ss` format.
            example:
              OriginGuids: [bbf8dc05-0735-43b3-a2fb-6406bda5097f]
              ProductionAlarmTriggerIds: [42]
              TimeSpan: "00:10:00"
      responses:
        "202":
          $ref: "#/components/responses/CommandAccepted"
        "400":
          description: The payload is invalid.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /DowntimeAlarmDeleteCommands:
    post:
      operationId: deleteDowntimeAlarm
      tags: [Automatic Downtime Generation]
      summary: Disable automatic downtime generation
      description: |
        Disables the automatic downtime generation - deletes the generation rules identified by `OriginGuids` and `ProductionAlarmTriggerIds`.

        Required access right: _Admin_.
      parameters:
        - $ref: "#/components/parameters/CommandCustomId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [OriginGuids, ProductionAlarmTriggerIds]
              properties:
                OriginGuids:
                  type: array
                  items:
                    type: string
                    format: uuid
                ProductionAlarmTriggerIds:
                  type: array
                  items:
                    type: integer
            example:
              OriginGuids: [bbf8dc05-0735-43b3-a2fb-6406bda5097f]
              ProductionAlarmTriggerIds: [42]
      responses:
        "202":
          $ref: "#/components/responses/CommandAccepted"
        "400":
          description: The payload is invalid.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  # ---------------------------------------------------------------------------
  # Job Plan (endpoints historically named JobTypes)
  # ---------------------------------------------------------------------------
  /JobTypes:
    get:
      operationId: getJobTypes
      tags: [Job Plan]
      summary: List planned jobs
      description: |
        Gets the job plan (the list of planned jobs) of the user's current subscription.

        Required access right: _View_.
      parameters:
        - name: measurementId
          in: query
          required: false
          schema:
            type: integer
          description: When specified, only the planned jobs of the given measurement are returned.
      responses:
        "200":
          description: The job plan (the list of planned jobs).
          content:
            application/hal+json:
              schema:
                type: object
                properties:
                  _links:
                    $ref: "#/components/schemas/HalLinks"
                  _embedded:
                    type: object
                    properties:
                      jobType:
                        type: array
                        items:
                          $ref: "#/components/schemas/JobType"
              example:
                _links:
                  self:
                    href: /Api/JobTypes
                _embedded:
                  jobType:
                    - jobTypeId: 730039621
                      title: Order 2026-0042
                      setpoint: 50
                      measurementId: 1770
                      plannedFrom: "2026-07-02T06:50:00Z"
                      plannedTo: "2026-07-02T07:20:00Z"
                      isPermanent: false
                      currentState: Available
                      order: 1
                      commandGuid: 5ad8938c-21dc-4b51-9b2c-3a8bfb2b816d
                      targetAmount: 100
                      workOrderNumber: WO-2026-0042
                      customFields:
                        PartNumber: PN-123
                      _links:
                        self:
                          href: /Api/JobTypes/730039621
                    - jobTypeId: 730039622
                      title: 01.SP
                      setpoint: 36.67
                      measurementId: 1771
                      isPermanent: false
                      currentState: Available
                      order: 1
                      commandGuid: 1d8a6a09-d957-4969-9c69-2a061d6c92f4
                      _links:
                        self:
                          href: /Api/JobTypes/730039622
        "401":
          $ref: "#/components/responses/Unauthorized"

  /JobTypes/{id}:
    get:
      operationId: getJobType
      tags: [Job Plan]
      summary: Get planned job
      description: |
        Gets the planned job with the specific identifier.

        Required access right: _View_.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: The planned job identifier.
      responses:
        "200":
          description: The planned job.
          content:
            application/hal+json:
              schema:
                $ref: "#/components/schemas/JobType"
              example:
                jobTypeId: 730039621
                title: Order 2026-0042
                setpoint: 50
                measurementId: 1770
                plannedFrom: "2026-07-02T06:50:00Z"
                plannedTo: "2026-07-02T07:20:00Z"
                isPermanent: false
                currentState: Available
                order: 1
                commandGuid: 5ad8938c-21dc-4b51-9b2c-3a8bfb2b816d
                targetAmount: 100
                workOrderNumber: WO-2026-0042
                _links:
                  self:
                    href: /Api/JobTypes/730039621
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /JobTypesImportCommands:
    post:
      operationId: importJobTypes
      tags: [Job Plan]
      summary: Upload the job plan (CSV)
      description: |
        Uploads the CSV file with the job plan (see the group description for the file format). Exactly one file is expected as a multipart content.

        __The import replaces the whole job plan__ of every measurement affected by the file.

        Required access right: _DataAdmin_ (for all affected measurements; insufficient rights on any of them cause the `DataError` command result).

        The import is asynchronous: the response contains the relative URL (`location`) of the command result. Poll the URL until the `result` reaches `Success` or `DataError` (the `reason` property then describes the problem, e.g. `Header does not contain any valid field.` or `Title must be defined.`).

        __Configuration:__ the CSV parsing (the time zone the dates are interpreted in and the culture used for parsing dates and numbers) can be customized per customer account on request - contact the Plantyst support.
      parameters:
        - $ref: "#/components/parameters/CommandCustomId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [jobTypesFile]
              properties:
                jobTypesFile:
                  type: string
                  contentMediaType: text/csv
                  description: The CSV file with the job plan (UTF-8, comma or semicolon separated, with a header row). Send exactly one file part; the form field name is not significant.
      responses:
        "202":
          $ref: "#/components/responses/CommandAccepted"
        "400":
          description: The multipart data are invalid or more than one file was uploaded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
              example:
                Message: Only single file upload is supported.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: The user does not have the DataAdmin right for any measurement.
        "415":
          description: The request content is not a MIME multipart content.

  # ---------------------------------------------------------------------------
  # Calendar
  # ---------------------------------------------------------------------------
  /Calendars/{measurementId}/Events:
    parameters:
      - name: measurementId
        in: path
        required: true
        schema:
          type: integer
    get:
      operationId: getCalendarEvents
      tags: [Calendar]
      summary: Get calendar events
      description: |
        Gets the calendar events (shifts and planned shutdowns) of the measurement in the given time range.

        Required access right: _View_.
      parameters:
        - name: fromDate
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: toDate
          in: query
          required: true
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: The calendar events with the related operators.
          content:
            application/hal+json:
              schema:
                $ref: "#/components/schemas/CalendarEventList"
              example:
                hasDataAdminAccessRightDictionary:
                  "3": true
                _links:
                  self:
                    href: /Api/Calendars/3/Events/
                _embedded:
                  event:
                    - shiftName: Morning shift
                      shiftType: Morning
                      eventType: PlannedProduction
                      measurementId: 3
                      start: "2026-07-12T06:00:00Z"
                      end: "2026-07-12T14:00:00Z"
                      pauses:
                        - from: "04:00:00"
                          to: "04:15:00"
                      plannedOperatorAssignment: 1
                      overtime: false
                      guid: 29488260-a3c8-4ed4-be08-2fd84fbfd66c
                      _links:
                        self:
                          href: /Api/Calendars/3/Events/PlannedProduction/1783836000
                        operators:
                          href: /Api/Users/101
                  user:
                    - userId: 101
                      name: Jan Novák
                      _links:
                        self:
                          href: /Api/Users/101
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createCalendarEvent
      tags: [Calendar]
      summary: Create calendar event
      description: |
        Creates a calendar event (a shift or a planned shutdown) on the measurement.

        Required access right: _DataAdmin_.
      parameters:
        - $ref: "#/components/parameters/CommandCustomId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [FromDate, ToDate]
              properties:
                FromDate:
                  type: string
                  format: date-time
                  description: The start of the event; it also becomes the event identifier (its Unix timestamp).
                ToDate:
                  type: string
                  format: date-time
                EventType:
                  type: string
                  enum: [plannedProduction, plannedShutdown]
                  description: The type of the event; `plannedProduction` (a shift) when omitted.
                ShiftName:
                  type: string
                ShiftType:
                  type: string
                  description: User-defined shift type label (e.g. `Morning`).
                Pauses:
                  type: array
                  items:
                    $ref: "#/components/schemas/PauseIntervalWrite"
                PlannedOperatorAssignment:
                  type: number
                  minimum: 0
                  description: The planned number of assigned operators.
                EffectiveOperatorAssignment:
                  type: number
                  minimum: 0
                  description: The effective number of assigned operators.
                Overtime:
                  type: boolean
            example:
              FromDate: "2026-07-12T06:00:00Z"
              ToDate: "2026-07-12T14:00:00Z"
              EventType: plannedProduction
              ShiftName: Morning shift
              ShiftType: Morning
              Pauses:
                - From: "04:00:00"
                  To: "04:15:00"
              PlannedOperatorAssignment: 1
      responses:
        "202":
          $ref: "#/components/responses/CommandAccepted"
        "400":
          description: The payload is invalid (e.g. a negative operator assignment).
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /Calendars/Events:
    post:
      operationId: getCalendarEventsBatch
      tags: [Calendar]
      summary: Get calendar events for multiple measurements
      description: |
        Gets the calendar events for the given measurements and time ranges in one request.

        Required access right: _View_ for every queried measurement (otherwise `403 Forbidden`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Queries:
                  type: array
                  items:
                    type: object
                    required: [MeasurementId, From, To]
                    properties:
                      MeasurementId:
                        type: integer
                      From:
                        type: string
                        format: date-time
                      To:
                        type: string
                        format: date-time
            example:
              Queries:
                - MeasurementId: 3
                  From: "2026-07-12T00:00:00Z"
                  To: "2026-07-19T00:00:00Z"
      responses:
        "200":
          description: The calendar events with the related operators.
          content:
            application/hal+json:
              schema:
                $ref: "#/components/schemas/CalendarEventList"
        "400":
          description: The payload is missing or invalid.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /Calendars/{measurementId}/Events/{eventType}/{id}:
    parameters:
      - name: measurementId
        in: path
        required: true
        schema:
          type: integer
      - name: eventType
        in: path
        required: true
        schema:
          type: string
          enum: [plannedProduction, plannedShutdown]
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: The event identifier - the Unix timestamp (in seconds) of the event start. Note that changing the event start also changes its identifier.
        example: "1783836000"
    patch:
      operationId: updateCalendarEvent
      tags: [Calendar]
      summary: Update calendar event
      description: |
        Updates the calendar event. Only events of the `plannedProduction` type can be updated (`400 Bad Request` otherwise); a planned shutdown has to be deleted and recreated instead. Only the properties present in the payload are changed (`FromDate`, `ToDate` and `OriginGuid` are always required).

        Unlike other command endpoints, the concurrency check runs synchronously: a stale `OriginGuid` responds with `409 Conflict` immediately.

        Required access right: _DataAdmin_.
      parameters:
        - $ref: "#/components/parameters/CommandCustomId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [OriginGuid, FromDate, ToDate]
              properties:
                OriginGuid:
                  type: string
                  format: uuid
                  description: The current `guid` of the event (see the group description).
                FromDate:
                  type: string
                  format: date-time
                  description: The new start of the event. Changing it also changes the event identifier.
                ToDate:
                  type: string
                  format: date-time
                ShiftName:
                  type: string
                ShiftType:
                  type: string
                Pauses:
                  type: array
                  items:
                    $ref: "#/components/schemas/PauseIntervalWrite"
                PlannedOperatorAssignment:
                  type: number
                  minimum: 0
                EffectiveOperatorAssignment:
                  type: number
                  minimum: 0
                Overtime:
                  type: boolean
            example:
              OriginGuid: 29488260-a3c8-4ed4-be08-2fd84fbfd66c
              FromDate: "2026-07-12T06:00:00Z"
              ToDate: "2026-07-12T15:00:00Z"
              ShiftName: Morning shift (extended)
      responses:
        "202":
          $ref: "#/components/responses/CommandAccepted"
        "400":
          description: The event type is not `plannedProduction`, the dates are invalid, or `FromDate` is not before `ToDate`.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: No event of the given type starts at the time given by `id`.
        "409":
          description: The `OriginGuid` is stale - the event has been modified in the meantime. Re-read the events to get the current `guid`.
    delete:
      operationId: deleteCalendarEvent
      tags: [Calendar]
      summary: Delete calendar event
      description: |
        Deletes the calendar event.

        Required access right: _DataAdmin_.
      parameters:
        - name: originGuid
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: The current `guid` of the event.
        - $ref: "#/components/parameters/CommandCustomId"
      responses:
        "202":
          $ref: "#/components/responses/CommandAccepted"
        "400":
          description: The event type is invalid.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /CalendarOperatorAddCommands:
    post:
      operationId: addCalendarOperator
      tags: [Calendar]
      summary: Assign operator to shift
      description: |
        Assigns the user as an operator of the shift given by the event identifier.

        Required access right: _DataAdmin_.
      parameters:
        - $ref: "#/components/parameters/CommandCustomId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalendarOperatorCommand"
            example:
              MeasurementId: 3
              Id: "1783836000"
              OriginGuid: 29488260-a3c8-4ed4-be08-2fd84fbfd66c
              UserId: 101
      responses:
        "202":
          $ref: "#/components/responses/CommandAccepted"
        "400":
          description: The payload is invalid.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /CalendarOperatorRemoveCommands:
    post:
      operationId: removeCalendarOperator
      tags: [Calendar]
      summary: Remove operator from shift
      description: |
        Removes the user from the operators of the shift given by the event identifier.

        Required access right: _DataAdmin_.
      parameters:
        - $ref: "#/components/parameters/CommandCustomId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalendarOperatorCommand"
            example:
              MeasurementId: 3
              Id: "1783836000"
              OriginGuid: 29488260-a3c8-4ed4-be08-2fd84fbfd66c
              UserId: 101
      responses:
        "202":
          $ref: "#/components/responses/CommandAccepted"
        "400":
          description: The payload is invalid.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
