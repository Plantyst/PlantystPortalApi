openapi: 3.1.0
info:
  title: Plantyst Portal
  version: "1.0.0"
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
  description: |
    Plantyst Portal API is a REST API designed to access data related to customer measurements like basic time series, metrics or annotations.

    ## Getting started

    The credentials are issued on request at [support@plantyst.com](mailto:support@plantyst.com). Two mechanisms are available (see Authorization for the details), each suited for a different kind of integration:

    * __API key__ - a per-user secret key, best suited for server-to-server integrations, typically reading the data. Keep in mind that the key is bound to a specific Plantyst user: everything written with it (downtimes, comments, production records, ...) is recorded in that user's name.
    * __OAuth2__ - the authorization code flow, best suited for interactive applications used by multiple users - each user works under their own identity.

    The quickest way to verify the access is to ask who you are:

    ```
    curl -H "X-API-KEY: {api_key}" https://portal.plantyst.com/api/Users/Me
    ```

    The response describes the user the credential is bound to - check that it is the expected account. A natural next call is `GET /Measurements` - the list of the measurements the user can access.

    ## Response format (HAL)

    Some API responses use the HAL convention. HAL (Hypertext Application Language) is a standard convention for defining hypermedia such as links to external resources within JSON or XML code. The standard was initially proposed in June 2012 specifically for use with JSON and has since become available in two variations, JSON and XML. The two associated MIME types are media type application/hal+xml and media type application/hal+json. See also https://en.wikipedia.org/wiki/Hypertext_Application_Language.

    To receive responses in the HAL format, send the `Accept: application/hal+json` header with the request. Without this header, the same data are returned in an alternative plain JSON serialization (embedded collections as top-level properties and `_links` as an array of link objects). The examples in this documentation show the HAL format.

    In HAL responses, a relation with a single link is serialized as an object, while a relation with multiple links is serialized as an array of link objects.

    For the Portal JSON endpoints, property names in request payloads are matched case-insensitively (e.g. `text` and `Text` are equivalent); the documentation uses the PascalCase form for requests and the camelCase form for responses, matching the server's own serialization. Two groups differ: the OAuth requests follow the OAuth standard snake_case names (`grant_type`, `client_id`), and the SCIM endpoints follow the SCIM attribute names documented in their chapter.

    ## Synchronous and asynchronous operations

    Most write operations of the API are __asynchronous commands__: the server validates the request, responds with `202 Accepted`, and the body carries the relative URL of the command result:

    ```json
    { "location": "api/commandResults/5ad8938c-21dc-4b51-9b2c-3a8bfb2b816d" }
    ```

    Poll the result URL until the `result` property reaches one of the final states:

    | `result` | Meaning |
    |---|---|
    | `Waiting` / `InProgress` | The command is queued or being processed. |
    | `Success` | The command completed successfully. |
    | `Conflict` | An optimistic concurrency check failed (a stale `ETag` or `OriginGuid` value) - re-read the resource and retry. |
    | `DataError` | The command data are invalid; the `reason` property describes the problem. |
    | `Failed` | The command processing failed. |
    | `AlreadyApplied` | The same command was already applied. |

    There are two families of command results, distinguished by the `location` URL:

    * __generic commands__ - the result lives at `api/commandResults/{id}` (see Command Results)
    * __metadocument commands__ - the commands changing metadocuments have their own result resource at `Api/MetadocumentCommandResults/{guid}` (see Metadocuments)

    Every command endpoint accepts an optional `commandCustomId` query parameter - a client-supplied identifier of the command. When the response with the `location` is lost, the result can be looked up with `GET /commandResults?commandCustomId={id}` (or `GET /MetadocumentCommandResults?commandCustomId={id}` for the metadocument commands).

    __Optimistic concurrency.__ Resources changed by commands carry the identifier of the last applied command - the `eTag` of a metadocument, the `commandGuid` of a measurement, downtime code or task, the `guid` of a calendar event. The update and delete commands take the current value (as `ETag`, `OriginGuid` or `OriginGuids`), and every applied command assigns a new one - so always re-read the resource before a subsequent change. A command with a stale value finishes with the `Conflict` result; some commands detect the conflict already synchronously and respond with `409 Conflict` (noted at the respective operations).

    The following table summarizes how the write operations of each area behave:

    | Area | Write operations | Command result |
    |---|---|---|
    | Metadocuments (incl. comments, production entries, split) | asynchronous | `Api/MetadocumentCommandResults/{guid}` |
    | Production records import (NOK CSV) | asynchronous | `api/commandResults/{id}` |
    | Tasks (Beta) | asynchronous | `api/commandResults/{id}` |
    | Downtime Codes Dictionary | asynchronous | `api/commandResults/{id}` |
    | Automatic Downtime Generation | asynchronous | `api/commandResults/{id}` |
    | Job Plan (CSV import) | asynchronous | `api/commandResults/{id}` |
    | Calendar | asynchronous; concurrency conflicts reported synchronously with `409` | `api/commandResults/{id}` |
    | Measurement lifecycle & data sources | asynchronous; some conflicts synchronous (`409`) | `api/commandResults/{id}` |
    | Measurement tags | synchronous (the response directly carries the outcome) | - |
    | SCIM Provisioning | synchronous (SCIM protocol semantics) | - |

    ## Common workflows

    __Recording a downtime cause__

    1. Read the downtime code dictionary of the measurement - `GET /DowntimeDictionary?id={measurementId}` - and find the `key` of the desired code.
    2. Set the code to the downtime metadocument - `PATCH /Metadocuments/{guid}` with `{"DowntimeCodeKey": "..."}`.
    3. Leave the `Title` of the downtime empty - the Portal displays the dictionary description of the code (see the best practices in Metadocuments).
    4. Poll the command result returned by the PATCH until it reaches `Success`.

    __Starting and finishing a job__

    1. Read the job plan - `GET /JobTypes?measurementId={id}` - and pick the planned job.
    2. Start the job by creating a job metadocument - `POST /Metadocuments` with `Type: 2`, `From`, the `Title` and typically the `WorkOrderNumber` and `Setpoint` of the planned job; leave `To` unset while the job is running.
    3. Finish the job by setting its end - `PATCH /Metadocuments/{guid}` with the `To` time.

    __Recording production (good and scrap pieces)__

    1. Add the production records to the running job - `POST /Metadocuments/{guid}/ProductionEntries` with the `Type` (e.g. `OK`, `NOK`), the `Value` (quantity) and the `Time` within the job range.
    2. The recorded quantities drive the quality metrics (`ok`, `nok`, `Quality`) of the OEE metric set (see Measurement Data & Metrics).

    __Reading data for a dashboard__

    1. List the accessible measurements - `GET /Measurements`.
    2. Read the aggregated production data - `POST /MeasurementTimeSeriesAggregationsQuery`.
    3. Read the computed KPIs - `POST /MeasurementMetricsQuery` (production and uptime), or `POST /MeasurementMetricsQuery2` for the OEE set.
    4. Read the operational records of the range - `POST /MetadocumentsQuery` (jobs, downtimes, annotations).

    __Receiving webhook notifications__

    1. Register the webhook - contact [support@plantyst.com](mailto:support@plantyst.com) with the callback URL (see Webhooks for the details and the payload contract).
    2. Receive the events - the platform POSTs an envelope with the `eventType` (`MetadocumentCreate` / `MetadocumentUpdate` / `MetadocumentDelete`) and the changed metadocument in `data`.
    3. Acknowledge every delivery quickly with a `2xx` response - otherwise the event is delivered again.
    4. Skip the echoes of your own changes: compare the `commandGuid` of the event with the command identifiers of your own API calls (the last segment of the `location` URL returned by a command).
    5. When the handler needs more data, call the API back with the token from `authorization.value` of the envelope.

    ## Compatibility

    The API is not versioned. Backward compatible extensions - new properties in responses, new endpoints - may appear at any time, so clients must ignore unknown properties. The groups marked __Beta__ may still change in incompatible ways - do not build critical flows on them.
  contact:
    name: Plantyst support
    email: support@plantyst.com

servers:
  - url: https://portal.plantyst.com/api

security:
  - oauth2: []
  - basicApiKey: []
  - apiKeyHeader: []
  - apiKeyQuery: []

tags:
  - name: Authorization
    description: |
      The API supports two authorization mechanisms:

      * __OAuth2__ - bearer tokens in the _JWT_ (_JSON Web Token_) format, obtained through the OAuth2 authorization code flow described below; intended for third party applications acting on behalf of a Plantyst user
      * __API key__ - a per-user secret key; intended for server-to-server integrations

      Credentials for both mechanisms (`client_id`, `client_secret` and `redirect_uri` for OAuth2, the API key) are issued on request at [support@plantyst.com](mailto:support@plantyst.com).

      __Note:__ When a request is not authenticated (missing or invalid credentials), the server currently responds with a `302` redirect to the login page instead of a plain `401`. API clients should disable automatic redirect following and treat a `302` on an API URL as an authentication failure. The `401` responses documented below describe the intended semantics.

      __API key authorization__

      The API key is bound to a specific Plantyst user and may have a limited validity period. The key can be passed with the request in one of the following ways:

      * __HTTP Basic authentication__ - the `Authorization` header with the `Basic` scheme, where the username is the user's email and the password is the API key: `Authorization: Basic {base64(email:api_key)}`
      * __Custom header__ - the `X-API-KEY` header: `X-API-KEY: {api_key}`
      * __Query string__ - the `api_key` parameter appended to the request URL: `https://portal.plantyst.com/api/Measurements?api_key={api_key}`; useful for quick tests, but avoid it in production integrations because URLs tend to end up in logs

      __OAuth2 authorization__

      The OAuth2 workflow is designed to acquire a user token for the access to user resources in Plantyst through the public API. The token serves as the authorization mechanism for third party applications. The application needs to be registered in the Plantyst system, having its own `client_id`, `client_secret` and `redirect_uri` properties.

      The acquired access token is passed with every API request in the `Authorization` header:

      ```
      Authorization: Bearer {access_token}
      ```
  - name: Measurements
    description: |
      This section contains endpoints for the resources related to measurements and their basic properties. A measurement is a core resource to which most other API data relates. A measurement object has the following properties:

      * `measurementId` - unique identifier of the measurement
      * `title` - title of the measurement
      * `description` - additional description for the measurement
      * `quantityType` - type of the measured quantity; available values: `speed` (continuous production), `rate` (number of pieces), `stroke` (production cycle count), `time` (run time), `temperature`, `humidity`, `power`, `flow`, `workload`, `rotation`
      * `archived` - determines whether the measurement is archived
      * `first` - the date and time of the first collected data sample
      * `rights` - the array of current user access rights for the measurement

      The rights used in the Plantyst application are the following:
      * _View_ - right to view measurement data
      * _Contributor_ - right to create, update and delete records like annotations, jobs and downtimes
      * _DataAdmin_ - right to import job lists (JobTypes import) and to manage the measurement calendar
      * _Admin_ - right to update measurement configuration (user access, tags, downtime codes, ...)
      * _Owner_ - same as Admin, but the access rights can't be revoked

      The rights are hierarchical: each right includes all the lower ones (e.g. a user with the _DataAdmin_ right also has the _Contributor_ and _View_ rights). Endpoints in this documentation state the minimal required access right.

      __Administration__

      Besides the measurement list, the group also contains the administration of the measurements:

      * __Lifecycle commands__ - creating, updating and archiving a measurement, following the asynchronous command pattern. The update and archive commands take the current `commandGuid` of the measurement as `OriginGuid` - every applied command assigns a new value, so re-read the measurement before a change.
      * __Shift systems__ - the shift schedules of a measurement (read-only in the API; managed in the Portal settings).
      * __Tags__ - colored labels assigned to the measurements, used for filtering and grouping in the Portal. A tag is shared within the customer account. The tag operations are synchronous (no command result polling).
      * __Data sources__ - the device inputs the measurements collect their data from: creating an input on a device and (un)assigning it to a measurement. The device and input identifiers are provided by Plantyst when the hardware is provisioned.

      Managing the tags and updating or renaming a measurement requires the _Admin_ right; archiving a measurement and managing its data sources requires the _Owner_ right (plus administrator access to the device).
  - name: Measurement Data & Metrics
    description: |
      Reading the collected measurement data and the production KPIs computed from them:

      * __Time series__ (`/MeasurementTimeSeriesAggregationsQuery`) - the aggregated production data of a time range.
      * __Basic metrics__ (`/MeasurementMetricsQuery`) - the produced amount and the uptime share of a time range.
      * __OEE metric set__ (`/MeasurementMetricsQuery2`, __Beta__) - the full OEE decomposition (availability x performance x quality) plus the fulfillment metrics. The planned production time comes from the measurement calendar (see Calendar) - without a calendar, the planned-time-based metrics are `null`. The endpoint is a Beta version - the set of returned metrics and their names may still change. The KPI terminology is explained in the [support center guide](https://support.plantyst.com/hc/cs/articles/17673220154908) (currently in Czech only).

      The metrics are returned as `{name, value}` pairs; a `value` is `null` when the metric cannot be computed from the available data. Reading requires the _View_ right.
  - name: Metadocuments
    description: |
      Resources related to metadocuments in the API. Metadocument is a general term for various types of measurement-related records. The `type` of the metadocument determines its meaning:

      * `0` - general (undefined) type
      * `1` - __annotation__ - a note attached to a time point or a time range
      * `2` - __job__ - a production job (work order) executed on the measurement
      * `3` - __downtime__ - a downtime interval, optionally classified by a downtime code

      A metadocument is defined for a single time point (`to` equals `from`), for a time range (`to` greater than `from`), or as unlimited (`to` is `null` - e.g. a job or downtime that is still running).

      __Best practice per metadocument type__

      * __downtime__ (`3`) - set only `DowntimeCodeKey` and leave `Title` empty. The UI displays the description of the downtime code from the downtime code dictionary, so a later change of the description in the dictionary propagates to all downtimes. Setting `Title` directly would freeze the text in each metadocument.
      * __job__ (`2`) - use `Title` (and the job-related properties); do not use `DowntimeCodeKey`.
      * __annotation__ (`1`) - no title is needed; typically only the comment text (`Text`) is set.

      __Command-based architecture__

      All operations that change the state of metadocuments are asynchronous commands - the general pattern (`202 Accepted` + polling the `location` URL) and the final states are described in _Synchronous and asynchronous operations_ in the introduction. The metadocument commands have their own result resource, `Api/MetadocumentCommandResults/{guid}`; the `Conflict` result signals a failed optimistic concurrency check (see the ETag note below).

      __Optimistic concurrency__

      Every metadocument carries an `eTag`. The update and delete operations accept an optional ETag value; when it is provided and the metadocument has been modified in the meantime, the command finishes with the `Conflict` result.

      __Command custom identifier__

      Every command operation accepts an optional `commandCustomId` query parameter - a client-supplied identifier of the command. The command result can later be looked up with `GET /MetadocumentCommandResults?commandCustomId={id}` (useful when the response with the command location was lost).

      __Text formatting and mentions__

      The `description` of a metadocument and the `text` of the comments are plain strings in the API, but the Portal renders them as __Markdown__ (CommonMark).

      A comment can additionally __mention a user or a team__ with a Markdown link that has a special target: `[Jan Novák](#userId:92)` mentions a user, `[Plantyst Team](#teamId:1)` mentions a team and expands to all its members. The link text is the displayed label; the target must keep the exact `#userId:{id}` / `#teamId:{id}` format (the user identifiers are the ones returned by `/Users` and in `_embedded.user`). The server processes the mentions asynchronously and notifies the mentioned users; only users with access to the measurement are notified.

      __Change history__

      Every processed metadocument command is recorded in an audit log that can be read with `POST /MetadocumentHistoryLogsQuery` - including the exact changes expressed as a JSON Patch document.

      __Access rights__

      Reading metadocuments requires the _View_ right; creating, updating and deleting requires the _Contributor_ right. Metadocuments marked `readOnly` and properties locked by another user (`locks`) cannot be modified; users with the _Admin_ right bypass the locks. Comments can be updated only by their author; deleting another user's comment requires the _Admin_ right.
  - name: Downtime Codes Dictionary
    description: |
      The downtime code dictionary classifies downtimes by their cause. Every measurement has its own list of codes; a downtime metadocument references a code through its `key` (the `DowntimeCodeKey` property, see Metadocuments).

      The meaning of the code properties:

      * `key` - server-assigned identifier of the code, referenced by downtime metadocuments; stable for the whole lifetime of the code
      * `code` - short human-readable code displayed in the UI (format `^([a-zA-Z0-9]+\.?)+$`, at most 10 characters)
      * `title` - the description of the cause; the UI displays it for every downtime classified with the code
      * `canBeSelected` - whether operators can select the code manually
      * `validTo` - soft-delete timestamp; `null` for active codes (deleted codes stay in the dictionary because historical downtimes may reference them)
      * `commandGuid` - the identifier of the command that created or last changed the code; every change assigns a new value. It is used as `OriginGuids` when updating, deleting or restoring codes - always re-read the dictionary before a subsequent change.
      * `isBreakdown` - the code marks a breakdown
      * `isCommentRequired` - operators must add a comment when using the code
      * `isTransferable`, `isShiftPauseTransferable` - the downtime is transferred to the next shift / over shift pauses
      * `isReducingPlannedTime`, `isReducingProduction`, `isReducingProductionTime` - how the downtime affects the OEE computation (planned time / production / production time reduction)
      * `maxLength` - the maximal length of the downtime in seconds; a longer downtime is automatically split

      Reading the dictionary requires the _View_ right; the management commands require the _Admin_ right and follow the asynchronous command pattern (`202 Accepted` + `location`, see Command Results).
  - name: Automatic Downtime Generation
    description: |
      Configuration of the automatic inactivity detection: when the machine produces nothing for longer than the configured minimum stop length, a downtime metadocument is created automatically for the measurement. Each __generation rule__ defines the minimum stop length for one measurement.

      The management commands require the _Admin_ right and follow the asynchronous command pattern (`202 Accepted` + `location`, see Command Results).

      __Naming note:__ The endpoint URLs and property names keep the historical name "downtime alarm" (`/DowntimeAlarm*Commands`, `ProductionAlarmTriggerIds`); it denotes the same concept as the automatic downtime generation.

      __Note:__ The API currently has no endpoint for listing the configured generation rules. The `OriginGuids` value can be tracked by the integration itself: the guid of the add or update command (the last segment of the returned `location` URL) becomes the `commandGuid` of the rule. The `ProductionAlarmTriggerIds` are however not exposed by the API at all - they are available only in the Portal settings (Settings - Downtimes - Automatic downtimes generating). A command with a stale `OriginGuids` value finishes with the `Conflict` result.

  - name: Job Plan
    description: |
      The job plan is the list of production jobs (work orders) prepared for the measurements - the jobs ready to run. Operators pick a planned job from the list on the shop floor; a started job is then represented as a job metadocument (see Metadocuments).

      The endpoints of this group are historically named `/JobTypes` - a "job type" in the API contract means one planned job of the plan, not a category of jobs. The documentation uses the terms __job plan__ (the whole list) and __planned job__ (one item).

      The job plan is maintained by importing a CSV file. The import is an asynchronous command: the server responds with `202 Accepted` and the relative URL (`location`) of the command result (see Command Results). __The import replaces the whole job plan__ of every measurement affected by the file.

      Required access rights: reading requires _View_ (the list is scoped to the user's current subscription); the CSV import requires the _DataAdmin_ right for the affected measurements.

      __CSV file format__

      * encoding UTF-8, values separated by a comma (`,`) or a semicolon (`;`) - the delimiter is detected automatically
      * the first row is a header with column names; the names are matched case-insensitively, unknown columns are ignored
      * supported columns: `Title` (required), `Setpoint`, `MeasurementId`, `PlannedFrom`, `PlannedTo`, `MaximumProductionCoefficient`, `MaximumProductionCoefficientDenominator`, `Description`, `AvailableTools`, `Operations`, `TargetAmount`, `MultipleInstanceId`, `IsMultipleInstanceOverlapDisabled`, `WorkOrderNumber`
      * `AvailableTools` and `Operations` may contain multiple values separated by a pipe (`|`)
      * `PlannedFrom`/`PlannedTo` are dates; the recommended format is UTC ISO 8601, e.g. `2026-07-02T06:50:00Z`
      * custom fields: any column prefixed `Custom.` (e.g. `Custom.PartNumber`) is imported into the `customFields` of the planned job
      * numeric validations: `Setpoint`, `TargetAmount`, `MaximumProductionCoefficient` and its denominator must be greater than zero when provided
      * limits: at most 10 000 rows per measurement and 500 000 rows per file
      * `MeasurementId` determines the measurement of each row. __When the column is missing or empty in all rows, the same imported list is applied to every measurement where the user has the DataAdmin right__ - always provide the column unless this is really intended.

      Example:

      ```
      Title,Setpoint,MeasurementId,PlannedFrom,PlannedTo,TargetAmount,WorkOrderNumber,Custom.PartNumber
      Order 2026-0042,50,1770,2026-07-02T06:50:00Z,2026-07-02T07:20:00Z,100,WO-2026-0042,PN-123
      ```
  - name: Calendar
    description: |
      The measurement calendar defines the planned production time: __shifts__ (`plannedProduction` events) and __planned shutdowns__ (`plannedShutdown` events). The calendar drives the OEE computation (planned time) and shift-related behavior like downtime transfers.

      __Event identity__

      * The event identifier (`id` in the URL) is the __Unix timestamp (in seconds) of the event start__. Changing the start of an event also changes its identifier.
      * Every event carries a `guid` - the identifier of the command that created or last changed it. It is passed as `OriginGuid` to the update, delete and operator commands, and a new value is assigned by every change (re-read the events before a subsequent change). A stale `OriginGuid` responds with `409 Conflict` (synchronously for the update).

      __Pauses__

      The shift pauses are expressed as __offsets from the shift start__ in the .NET TimeSpan format `[dd.]hh:mm:ss` - e.g. a pause `{ "from": "04:00:00", "to": "04:15:00" }` of a shift starting at 06:00 UTC runs from 10:00 to 10:15 UTC. The responses use the camelCase form (`{"from": ..., "to": ...}`); the create and update requests use the PascalCase form (`{"From": ..., "To": ...}`).

      Reading the calendar requires the _View_ right; the management operations require the _DataAdmin_ right and follow the asynchronous command pattern (`202 Accepted` + `location`, see Command Results).
  - name: Tasks (Beta)
    description: |
      Tasks attached to the metadocuments - simple to-do items (e.g. "replace the mold") created over a job, downtime or annotation. In the Portal, the tasks appear on the metadocument detail and in the task overview.

      A task carries a `title`, an optional `dueDate` (the planned date) and `deadline` (the latest date it should be finished), and its completion state (`completedDate`). The metadocument shows its task as the read-only `task` property (`{id, initialTitle}`).

      __Beta:__ the Tasks API is a Beta version - improvements are under development and the contract may still change. Do not build critical flows on it yet.

      The management operations follow the asynchronous command pattern (`202 Accepted` + `location`, generic command results - see _Synchronous and asynchronous operations_ in the introduction). Every change assigns a new `commandGuid` to the task; the update and delete commands require the current value as `OriginGuid` - re-read the task before a change.

      Reading the tasks requires the _View_ right of the measurement of the linked metadocument; creating, updating and deleting requires the _Contributor_ right, and the measurement must belong to the current customer account of the user.
  - name: Users & Subscriptions
    description: |
      Read-only endpoints providing the identity context of the API client.

      __Users__ resolve the user references appearing across the API - `creatorId` of metadocuments, `userId` of comments and production entries, or shift operators. The list and detail endpoints intentionally expose only the identifier and the display name; the full profile is available only for the token owner itself (`/Users/Me`).

      __Subscriptions__ represent the customer accounts the user belongs to. Most collection endpoints (measurements, the job plan, users) are scoped to the user's __current subscription__.

      The user management itself (creating users, groups and access) is not part of this API - it is handled by the SCIM provisioning interface (see the SCIM chapter) or by the Plantyst Portal administration.
  - name: SCIM Provisioning
    description: |
      A [SCIM 2.0](https://datatracker.ietf.org/doc/html/rfc7644) provisioning interface for identity providers (e.g. Microsoft Entra ID, Okta) and customer IT administrators - creating and deactivating users, managing groups and their membership.

      __Directory__

      The provisioning is bound to a __directory__ - the link between the customer's identity provider tenant and Plantyst. The directory (its `directoryId` in the URL) and the provisioning access are set up on request at [support@plantyst.com](mailto:support@plantyst.com).

      The authentication uses the standard __OAuth2 bearer token (JWT)__ of the API - the same token kind as the rest of the API (see Authorization); __API keys are not supported for SCIM__. The token must be obtained through an application that Plantyst has bound to the directory and granted the provisioning security roles (`Plantyst/User/Read`, `Plantyst/User/Write`, `Plantyst/Group/Read`, `Plantyst/Group/Write`) - typically a dedicated application registration whose token is pasted as the "secret token" into the identity provider's provisioning configuration. A token without the roles is rejected with `401`; a token bound to a different directory with `403 Forbidden`.

      __Users and groups__

      * A SCIM user maps to a Plantyst user: `userName` = e-mail (login), `displayName` = name, `locale` = language. The SCIM `id` equals the `userId` used elsewhere in the API. Deleting a user deactivates it (the account is kept for historical references).
      * A SCIM group maps to a Plantyst __group__ - the primary organizational structure of the customer account. Groups can be nested into a hierarchy (see the `parentGroupDisplayName` extension below), and the group hierarchy can then serve as the hierarchy for measurements - elsewhere in the API it appears as `hierarchicalLocations` and the `groupId` filter of `/Measurements`. A created group becomes a child of the directory root group, or of the group named by `parentGroupDisplayName`. __Group membership controls the access of the users to the measurements under the group.__

      __Plantyst SCIM extensions__

      Both resource types carry Plantyst-specific attributes. They are defined by the extension URNs below, but __on the wire they are serialized as plain top-level properties of the resource__ - there is no nested extension object, and the names are case-sensitive. Note an asymmetry in the `schemas` attribute: the user resources list only the core URN, while the group resources list the core and the extension URN.

      __This serialization deviates from RFC 7643__, which nests extension attributes in a complex attribute named by the extension URN (and requires the URN in `schemas`). Generic SCIM connectors or validators expecting the standard shape will not find these attributes - read and write them as plain top-level properties instead.

      * `urn:ietf:params:scim:schemas:extension:plantyst:1.0:User`
        * `Role` - the Plantyst role of the user (read-only)
        * `ManagedType` - `Managed` (the user is managed by this directory) or `Unmanaged` (an account of the customer outside the directory); read-only, see the `filterManagedType` query parameter
        * note: both properties are serialized in PascalCase
      * `urn:ietf:params:scim:schemas:extension:plantyst:1.0:Group`
        * `parentGroupDisplayName` - the display name of the parent group; builds the group hierarchy. It can also be changed with a `PATCH` operation to move the group under a different parent (the parent must exist in the directory).
        * `shortName` - a short label of the group. The `displayName` must be unique (and therefore tends to be long); where space matters - typically in hierarchical path displays showing the whole chain of groups - the `shortName` is displayed instead. When not set, the `displayName` is used.

      __Protocol notes__

      * Requests and responses use `application/scim+json` (plain `application/json` is accepted as well).
      * Updates use the SCIM `PatchOp` message; `PUT` replacement is not supported (`501 Not Implemented`).
      * The discovery endpoints (`/ServiceProviderConfig`, `/Schemas`, `/ResourceTypes`) are not implemented.
  - name: Webhooks
    description: |
      Plantyst can notify an integration about metadocument changes by calling a registered HTTP callback URL (a webhook). Webhooks are set up on request at [support@plantyst.com](mailto:support@plantyst.com) - provide the callback URL and agree on the optional `configuration` value echoed with every delivery. The webhook fires for every metadocument change on all measurements accessible to the integration user; there is currently no self-service management API.

      __Events__

      * `MetadocumentCreate` - a metadocument was created
      * `MetadocumentUpdate` - a metadocument was updated (including changes of its comments and production entries)
      * `MetadocumentDelete` - a metadocument was deleted

      __Delivery and acknowledgement__

      The delivery is a `POST` request with an `application/json` body (see the webhook definition below). Acknowledge it with any `2xx` status code; other status codes and unreachable URLs cause several redelivery attempts before the delivery is dropped. Deliveries may occasionally arrive out of order or repeatedly - use `data.lastModified` and `data.eTag` to decide whether the payload is newer than your state.

      __Security and the recommended integration pattern__

      The delivery is not signed. Treat the payload as a notification and verify anything important by reading the current state through the REST API - the `authorization` object in the body carries a short-lived (1 hour) credential for that: use `authorization.value` as the `Authorization: Bearer {value}` header (or as an API key when `authorizationType` is `ApiKey`). Because the payload contains this credential, treat the whole request body as a secret.

      __Detecting own changes__

      The `commandGuid` of the event equals the command identifier returned to the API caller in the command `location` URL. An integration that also writes through the API can compare it with its own issued commands and skip the echo of its own changes.

      __What changed__

      The `appliedChanges` property carries a JSON Patch (RFC 6902) document describing the changes applied by the command - useful for reacting only to specific properties (e.g. a path `/DowntimeCode` means the downtime code changed). Note that the patch paths use PascalCase property names, unlike the camelCase payload.

  - name: Command Results
    description: |
      The results of the generic asynchronous commands. The pattern - `202 Accepted`, polling the `location` URL and the meaning of the final states - is described in _Synchronous and asynchronous operations_ in the introduction.

      The metadocument commands use their own result resource - see `/MetadocumentCommandResults` in the Metadocuments group.
paths:
  /OAuth/Authorize:
    get:
      operationId: getLoginPage
      tags: [Authorization]
      summary: Get login page
      description: |
        To get the login page, the application has to redirect the user to the following URL: `https://portal.plantyst.com/OAuth/Authorize?client_id={client_id}&response_type=code&redirect_uri={url_encoded_redirect_uri}&state={optional_state_string}`.

        Once the user logs in and confirms the delegation of the rights to the third party application, the server redirects the user to the given redirect URL and adds the temporary authorization code to the response query string. The authorization code is valid for 5 minutes.

        In case of a login error, the next procedure is described in the RFC https://tools.ietf.org/html/rfc6749#section-4.1.2.1
      security: []
      servers:
        - url: https://portal.plantyst.com
      parameters:
        - name: client_id
          in: query
          required: true
          schema:
            type: string
          example: 9sgfr867q
          description: Obtained during the registration process of the application.
        - name: response_type
          in: query
          required: true
          schema:
            type: string
            enum: [code]
          example: code
          description: The type of the authorization flow; currently, Plantyst supports only the „code“ type.
        - name: redirect_uri
          in: query
          required: true
          schema:
            type: string
          example: https://URL
          description: Absolute URI to which the user will be redirected after successful login.
        - name: state
          in: query
          required: false
          schema:
            type: string
          example: option
          description: Optional parameter, returned back to the redirect URL.
      responses:
        "200":
          description: The login page.

  /OAuth/Token:
    post:
      operationId: retrieveAccessToken
      tags: [Authorization]
      summary: Access token request
      description: |
        To get the actual access token, the client application sends a POST request with `grant_type` set to `authorization_code` and the following parameters:
        * `grant_type` - "authorization_code"
        * `code` - temporary authorization code from the first step
        * `redirect_uri` - redirect_uri of the application
        * `client_id` - client_id of the application
        * `client_secret` - client_secret of the application

        The response of the server is the user authorization token (JWT token) that can be used to authorize API requests by the given user and contains `expires_in` which is the number of seconds until the token expires.
        A refresh token is returned as well.

        __Refreshing the access token__

        When the access token expires, the application obtains a new one without user interaction by sending a POST request to the same URL with `grant_type` set to `refresh_token` and the following parameters:
        * `grant_type` - "refresh_token"
        * `refresh_token` - the refresh token returned with the previous access token
        * `client_id` - client_id of the application
        * `client_secret` - client_secret of the application

        Each successful refresh returns a new refresh token. The previous refresh token stays valid for 24 hours after the exchange, then it is discarded.

        In case of an error, the server responds with `400 Bad Request` and an `error` value according to [RFC 6749, section 5.2](https://tools.ietf.org/html/rfc6749#section-5.2): `invalid_request`, `invalid_client`, `invalid_grant` or `unsupported_grant_type`.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/AuthorizationCodeTokenRequest"
                - $ref: "#/components/schemas/RefreshTokenRequest"
            examples:
              authorizationCode:
                summary: Exchange of the authorization code
                value:
                  grant_type: authorization_code
                  code: "wxTd41…"
                  redirect_uri: https://application.example.com/callback
                  client_id: 9sgfr867q
                  client_secret: "pRt5cd…"
              refreshToken:
                summary: Refreshing the access token
                value:
                  grant_type: refresh_token
                  refresh_token: "3RZm2h56Sr1JB7dQxbC0T4Wu9pKfMv8jYgNaLeXsIoE="
                  client_id: 9sgfr867q
                  client_secret: "pRt5cd…"
      responses:
        "200":
          description: The user authorization token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthorizationToken"
              example:
                token_type: Bearer
                access_token: "eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJDbGllbnRJZCI6..."
                expires_in: 86400
                refresh_token: "3RZm2h56Sr1JB7dQxbC0T4Wu9pKfMv8jYgNaLeXsIoE="
        "400":
          description: Invalid token request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthError"
              example:
                error: invalid_grant

  /Measurements:
    get:
      operationId: listMeasurements
      tags: [Measurements]
      summary: List Measurements
      description: |
        Returns the measurements for which the current user has at least the _View_ right.

        Required access right: _View_.

        Along with the measurements (the `measurement` relation), additional data are embedded in the response under the following relations:
        * `timezone` array of all distinct timezones assigned to measurements
        * `tag` array of all distinct tags assigned to measurements
        * `measurementDataVersion` array of measurement data versions
        * `measurementCustomField` array of all distinct custom fields assigned to measurements
        * `hierarchicalLocation` array of hierarchical locations the measurements belong to

        __Reconstructing the location hierarchy__

        The embedded `hierarchicalLocation` entries form a tree, encoded in each entry's `level` string. `level` is an opaque __materialized path__ - a `/`-delimited string, wrapped in a leading and trailing slash, that is unique per location and gains one segment with each level of nesting (`/51/` for a top-level location, `/51/77/` for a location one level below it). All ancestors of every returned location are themselves included in the array, so the whole tree can be rebuilt from this flat list using string operations on `level` alone, without further requests:

        * __Parent__ - drop the last path segment; the parent is the entry whose `level` equals the remaining prefix (`/51/77/` -> `/51/`). An entry with a single segment (`/51/`) is a top-level location - its parent is the account root, which is not returned as a location.
        * __Ancestors__ - every proper prefix of an entry's `level` is the `level` of one of its ancestors.
        * __Children__ - the entries whose `level` starts with this entry's `level` and has exactly one more segment.
        * __Depth__ - the number of path segments (the count of `/` minus one).

        A measurement is attached to its location through the `hierarchicalLocation` link relation (`/Api/HierarchicalLocations/{id}`); match that id to a `hierarchicalLocation` entry to obtain the measurement's full location path.
      parameters:
        - name: groupId
          in: query
          required: false
          schema:
            type: integer
          description: Identifier of a hierarchical location group. When specified, only measurements within the hierarchy of the given group are returned and the `currentSubscriptionOnly` parameter is ignored.
        - name: currentSubscriptionOnly
          in: query
          required: false
          schema:
            type: boolean
            default: true
          example: true
          description: Determines whether all measurements or only measurements from the user's current subscription are returned.
      responses:
        "200":
          description: The list of measurements with embedded related resources.
          content:
            application/hal+json:
              schema:
                $ref: "#/components/schemas/MeasurementList"
              example:
                _links:
                  self:
                    href: /Api/Measurements
                _embedded:
                  timezone:
                    - id: Central Europe Standard Time
                      name: (UTC+01:00) Belgrade, Bratislava, Budapest, Ljubljana, Prague
                      iana: Europe/Prague
                      _links:
                        self:
                          href: /Api/TimeZone/Central%20Europe%20Standard%20Time
                  tag:
                    - id: "83"
                      title: Technology
                      color: "#E67E22"
                      _links:
                        self:
                          href: /Api/Tag/83
                    - id: "82"
                      title: Shop 1
                      color: "#1ABC9C"
                      _links:
                        self:
                          href: /Api/Tag/82
                  measurementDataVersion:
                    - id: "414"
                      title: TimeSeries
                      lastModified: "2016-10-25T16:05:00Z"
                      _links:
                        self:
                          href: /Api/MeasurementDataVersion/414
                    - id: "415"
                      title: DowntimeCodes
                      lastModified: "2016-10-25T16:05:00Z"
                      _links:
                        self:
                          href: /Api/MeasurementDataVersion/415
                  measurementCustomField:
                    - id: 12
                      key: CostCenter
                      value: CC-100
                      _links:
                        self:
                          href: /Api/MeasurementCustomField/12
                  hierarchicalLocation:
                    - hierarchicalLocationId: 51
                      title: Hall A
                      shortTitle: A
                      level: /51/
                      _links:
                        self:
                          href: /Api/HierarchicalLocations/51
                    - hierarchicalLocationId: 77
                      title: Line 1
                      shortTitle: L1
                      level: /51/77/
                      _links:
                        self:
                          href: /Api/HierarchicalLocations/77
                  measurement:
                    - measurementId: 3
                      title: 01 Machine 1
                      baseTitle: Machine 1
                      prefixLabel: "01"
                      commandGuid: 5ad8938c-21dc-4b51-9b2c-3a8bfb2b816d
                      description: Main production line
                      quantityType: speed
                      archived: false
                      first: "2016-01-01T00:00:00Z"
                      rights: [Admin]
                      _links:
                        self:
                          href: /Api/Measurement/3
                        timezone:
                          href: /Api/TimeZone/Central%20Europe%20Standard%20Time
                        tags:
                          href: /Api/Tag/82
                        dataVersions:
                          - href: /Api/MeasurementDataVersion/414
                          - href: /Api/MeasurementDataVersion/415
                        customFields:
                          href: /Api/MeasurementCustomField/12
                        hierarchicalLocation:
                          href: /Api/HierarchicalLocations/51
                    - measurementId: 4
                      title: 02 Machine 2
                      baseTitle: Machine 2
                      prefixLabel: "02"
                      commandGuid: 71c05f3a-9d2e-4b1f-8a67-30de5cb0a914
                      description: Main production line
                      quantityType: rate
                      archived: false
                      first: "2016-01-01T00:00:00Z"
                      rights: [Admin]
                      _links:
                        self:
                          href: /Api/Measurement/4
                        timezone:
                          href: /Api/TimeZone/Central%20Europe%20Standard%20Time
                        tags:
                          href: /Api/Tag/83
                        dataVersions:
                          href: /Api/MeasurementDataVersion/415
