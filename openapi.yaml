  # ---------------------------------------------------------------------------
  # Metadocuments
  # ---------------------------------------------------------------------------
  /Metadocuments:
    get:
      operationId: findMetadocumentsByCustomId
      tags: [Metadocuments]
      summary: Find Metadocuments by custom identifier
      description: |
        Gets the metadocuments identified by the combination of `measurementId` and `customId`.

        Required access right: _View_.
      parameters:
        - name: measurementId
          in: query
          required: true
          schema:
            type: integer
          description: The measurement identifier.
        - name: customId
          in: query
          required: true
          schema:
            type: string
          description: The user-defined identifier of the metadocument.
      responses:
        "200":
          description: The metadocuments with the given custom identifier and the related users.
          content:
            application/hal+json:
              schema:
                type: object
                properties:
                  _links:
                    $ref: "#/components/schemas/HalLinks"
                  _embedded:
                    type: object
                    properties:
                      metadocument:
                        type: array
                        items:
                          $ref: "#/components/schemas/Metadocument"
                      user:
                        type: array
                        items:
                          $ref: "#/components/schemas/UserSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: No metadocument with the given custom identifier exists.
    post:
      operationId: addMetadocument
      tags: [Metadocuments]
      summary: Add Metadocument
      description: |
        Adds a metadocument of the given type for the specific measurement.

        Required access right: _Contributor_.

        The optional `Text` property creates the first comment of the metadocument in the same command (with `CommentTime` as its time, when provided).
      parameters:
        - name: tryMergeWithExisting
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: When `true`, the server tries to merge the metadocument with an existing overlapping one instead of creating a new one.
        - name: allowMultiple
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: When `true`, allows multiple metadocuments with the same `CustomId` and `MeasurementId` to be inserted.
        - $ref: "#/components/parameters/CommandCustomId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MetadocumentCreate"
            examples:
              downtime:
                summary: Downtime classified by a downtime code (no Title - the UI shows the dictionary description of the code)
                value:
                  MeasurementId: 3
                  Type: 3
                  From: "2026-07-01T05:30:00Z"
                  To: "2026-07-01T07:30:00Z"
                  DowntimeCodeKey: "144"
                  CustomFields:
                    SourceId: ext-123
              job:
                summary: Job (work order) with a title
                value:
                  MeasurementId: 3
                  Type: 2
                  From: "2026-07-01T05:30:00Z"
                  To: null
                  Title: Order 2026-0042
                  WorkOrderNumber: WO-2026-0042
                  TargetAmount: 100
              annotation:
                summary: Annotation with the first comment
                value:
                  MeasurementId: 3
                  Type: 1
                  From: "2026-07-01T05:30:00Z"
                  To: "2026-07-01T05:30:00Z"
                  Text: Material batch changed
      responses:
        "202":
          $ref: "#/components/responses/MetadocumentCommandAccepted"
        "400":
          description: The payload is invalid.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /Metadocuments/{guid}:
    parameters:
      - name: guid
        in: path
        required: true
        schema:
          type: string
          format: uuid
        example: e2dd39dc-5389-43b9-b855-426af762811f
        description: Unique identifier of the metadocument.
    get:
      operationId: getMetadocument
      tags: [Metadocuments]
      summary: Get Metadocument
      description: |
        Returns the metadocument with the specified GUID, including the embedded comments, production entries and related users.

        Required access right: _View_.
      responses:
        "200":
          description: The metadocument with embedded related resources.
          content:
            application/hal+json:
              schema:
                $ref: "#/components/schemas/Metadocument"
              example:
                guid: 27a858a0-c244-4640-83f8-513dbc70c2e6
                type: 3
                creatorId: 497
                measurementId: 3
                from: "2026-07-01T05:30:00Z"
                to: "2026-07-01T07:30:00Z"
                color: "#969614"
                downtimeCode: "144"
                downtimeCodeKey: "144"
                eTag: "\"2f007274-0000-0d00-0000-6a4e18d80000\""
                customFields:
                  SourceId: ext-123
                lastModified: "2026-07-01T09:25:15Z"
                _links:
                  self:
                    href: /Api/Metadocuments/27a858a0-c244-4640-83f8-513dbc70c2e6
                  user:
                    href: /Api/Users/497
                _embedded:
                  comment:
                    - id: 1
                      text: Comment text
                      modificationTime: "2026-07-01T11:52:12Z"
                      _links:
                        self:
                          href: /Api/Metadocuments/27a858a0-c244-4640-83f8-513dbc70c2e6/Comments/1/
                        user:
                          href: /Api/Users/497
                  productionEntry:
                    - id: 1
                      time: "2026-07-01T07:00:00Z"
                      value: 120
                      type: OK
                      note: First batch
                      _links:
                        self:
                          href: /Api/Metadocuments/27a858a0-c244-4640-83f8-513dbc70c2e6/ProductionEntries/1/
                        user:
                          href: /Api/Users/497
                  user:
                    - userId: 497
                      name: Jan Novák
                      _links:
                        self:
                          href: /Api/Users/497
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: patchMetadocument
      tags: [Metadocuments]
      summary: Patch Metadocument
      description: |
        Updates the metadocument with the specified GUID. Only the properties present in the payload are changed.

        Required access right: _Contributor_ (see the group description for `readOnly` and `locks` restrictions).

        The optional `ETag` property enables the optimistic concurrency check: when the metadocument has been modified in the meantime, the command finishes with the `Conflict` result. The server responds with `400 Bad Request` when the patch does not change anything or would leave the metadocument without content.
      parameters:
        - $ref: "#/components/parameters/CommandCustomId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MetadocumentUpdate"
            example:
              DowntimeCodeKey: "144"
              To: "2026-07-01T08:00:00Z"
