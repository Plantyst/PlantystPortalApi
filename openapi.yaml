        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  # ---------------------------------------------------------------------------
  # SCIM Provisioning
  # ---------------------------------------------------------------------------
  /Directory/{directoryId}/Scim/v2/Users:
    parameters:
      - $ref: "#/components/parameters/ScimDirectoryId"
    get:
      operationId: scimQueryUsers
      security:
        - oauth2: []
      tags: [SCIM Provisioning]
      summary: Query users (SCIM)
      description: |
        Returns the users of the directory as a SCIM `ListResponse`. By default only the users managed by the directory are returned; with `filterManagedType=all` the unmanaged users of the customer account are included as well (with `ManagedType: Unmanaged`).
      parameters:
        - name: filter
          in: query
          required: false
          schema:
            type: string
          example: userName eq "jan.novak@example.com"
          description: "A SCIM filter expression. Supported attributes: `userName`, `displayName`, `locale`, `name.givenName`, `name.familyName`, `active`; unsupported attributes are ignored."
        - name: filterManagedType
          in: query
          required: false
          schema:
            type: string
            enum: [all]
          description: When set to `all`, users not managed by this directory are included in the result.
      responses:
        "200":
          description: The SCIM list response with the matching users.
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/ScimUserListResponse"
              example:
                schemas: ["urn:ietf:params:scim:api:messages:2.0:ListResponse"]
                totalResults: 1
                itemsPerPage: 1
                startIndex: 1
                Resources:
                  - schemas: ["urn:ietf:params:scim:schemas:core:2.0:User"]
                    id: "101"
                    userName: jan.novak@example.com
                    displayName: Jan Novák
                    active: true
                    ManagedType: Managed
        "400":
          description: The filter expression is invalid.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: The credential is not bound to the directory given in the URL.
    post:
      operationId: scimCreateUser
      security:
        - oauth2: []
      tags: [SCIM Provisioning]
      summary: Create user (SCIM)
      description: |
        Creates a user in the directory. The `userName` becomes the e-mail (and login) of the Plantyst user; `locale` sets the user language (the directory default is used when omitted).

        The domain of the `userName` e-mail must be one of the domains registered for the directory (agreed during the directory setup) - other domains are rejected with `400 Bad Request`.
      requestBody:
        required: true
        content:
          application/scim+json:
            schema:
              $ref: "#/components/schemas/ScimUser"
            example:
              schemas: ["urn:ietf:params:scim:schemas:core:2.0:User"]
              userName: jan.novak@example.com
              displayName: Jan Novák
              name:
                givenName: Jan
                familyName: Novák
              locale: cs-CZ
              active: true
      responses:
        "201":
          description: The created user, including its `id`.
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/ScimUser"
        "400":
          description: The payload is invalid, or the `userName` domain is not registered for the directory.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: The credential is not bound to the directory given in the URL.
        "409":
          description: A user with the given `userName` already exists.

  /Directory/{directoryId}/Scim/v2/Users/{id}:
    parameters:
      - $ref: "#/components/parameters/ScimDirectoryId"
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: The SCIM user identifier (equals the Plantyst `userId`).
    get:
      operationId: scimGetUser
      security:
        - oauth2: []
      tags: [SCIM Provisioning]
      summary: Get user (SCIM)
      responses:
        "200":
          description: The SCIM user.
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/ScimUser"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: The credential is not bound to the directory given in the URL.
        "404":
          description: The user does not exist in the directory.
    patch:
      operationId: scimPatchUser
      security:
        - oauth2: []
      tags: [SCIM Provisioning]
      summary: Update user (SCIM PatchOp)
      description: |
        Applies a SCIM `PatchOp` document to the user (`add`, `replace` and `remove` operations on the user attributes; deactivate a user by setting `active` to `false`).

        `PUT` replacement is not supported (`501 Not Implemented`) - use `PATCH`.
      requestBody:
        required: true
        content:
          application/scim+json:
            schema:
              $ref: "#/components/schemas/ScimPatchOp"
            example:
              schemas: ["urn:ietf:params:scim:api:messages:2.0:PatchOp"]
              Operations:
                - op: replace
                  path: displayName
                  value: Jan Novák ml.
      responses:
        "200":
          description: The updated SCIM user.
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/ScimUser"
        "400":
          description: The patch document is invalid.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: The credential is not bound to the directory given in the URL.
        "404":
          description: The user does not exist in the directory.
    delete:
      operationId: scimDeleteUser
      security:
        - oauth2: []
      tags: [SCIM Provisioning]
      summary: Deactivate user (SCIM)
      description: Deactivates the user. The Plantyst account is kept for historical references (`creatorId`, comment authors, ...), but can no longer sign in and is no longer returned by the SCIM endpoints (`404`).
      responses:
        "204":
          description: The user was deactivated.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: The credential is not bound to the directory given in the URL.
        "404":
          description: The user does not exist in the directory.

  /Directory/{directoryId}/Scim/v2/Groups:
    parameters:
      - $ref: "#/components/parameters/ScimDirectoryId"
    get:
      operationId: scimQueryGroups
      security:
        - oauth2: []
      tags: [SCIM Provisioning]
      summary: Query groups (SCIM)
      description: |
        Returns the groups under the directory root as a SCIM `ListResponse` - the same groups that form the measurement hierarchy elsewhere in the API.
      parameters:
        - name: filter
          in: query
          required: false
          schema:
            type: string
          example: displayName eq "Hall A"
          description: "A SCIM filter expression. Supported attributes: `displayName`, `shortName`; unsupported attributes are ignored."
        - name: excludedAttributes
          in: query
          required: false
          schema:
            type: string
          example: members
          description: Comma-separated attribute names to omit from the result (e.g. `members`).
      responses:
        "200":
          description: The SCIM list response with the matching groups.
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/ScimGroupListResponse"
        "400":
          description: The filter expression is invalid.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: The credential is not bound to the directory given in the URL.
    post:
      operationId: scimCreateGroup
      security:
        - oauth2: []
      tags: [SCIM Provisioning]
      summary: Create group (SCIM)
      description: |
        Creates a group as a child of the directory root group, or of the group named by `parentGroupDisplayName` - extending the group hierarchy.
      requestBody:
        required: true
        content:
          application/scim+json:
            schema:
              $ref: "#/components/schemas/ScimGroup"
            example:
              schemas: ["urn:ietf:params:scim:schemas:core:2.0:Group", "urn:ietf:params:scim:schemas:extension:plantyst:1.0:Group"]
              displayName: Line 1 (Hall A)
              shortName: Line 1
              parentGroupDisplayName: Hall A
              members:
                - value: "101"
      responses:
        "201":
          description: The created group, including its `id`.
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/ScimGroup"
        "400":
          description: The payload is invalid.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: The credential is not bound to the directory given in the URL.
        "404":
          description: The group named by `parentGroupDisplayName` does not exist in the directory.
        "409":
          description: A group with the given `displayName` already exists.

  /Directory/{directoryId}/Scim/v2/Groups/{id}:
    parameters:
      - $ref: "#/components/parameters/ScimDirectoryId"
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: The SCIM group identifier (equals the group identifier used elsewhere in the API, e.g. `groupId` of `/Measurements`).
    get:
      operationId: scimGetGroup
      security:
        - oauth2: []
      tags: [SCIM Provisioning]
      summary: Get group (SCIM)
      parameters:
        - name: excludedAttributes
          in: query
          required: false
          schema:
            type: string
          example: members
          description: Comma-separated attribute names to omit from the result.
      responses:
        "200":
          description: The SCIM group.
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/ScimGroup"
              example:
                schemas: ["urn:ietf:params:scim:schemas:core:2.0:Group"]
                id: "51"
                displayName: Hall A
                shortName: A
                members:
                  - value: "101"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: The credential is not bound to the directory given in the URL.
        "404":
          description: The group does not exist - or the lookup of an existing group failed on a missing group-directory link (a known server-side issue affecting individual group retrieval and updates; the query, create and delete endpoints are not affected). Use the query endpoint with a `displayName` filter as a workaround.
    patch:
      operationId: scimPatchGroup
      security:
        - oauth2: []
      tags: [SCIM Provisioning]
      summary: Update group (SCIM PatchOp)
      description: |
        Applies a SCIM `PatchOp` document to the group - typically `add` and `remove` operations on `members` (membership changes control the access of the users to the measurements under the group), a `replace` of `displayName`, or a `replace` of `parentGroupDisplayName` to move the group under a different parent in the hierarchy.

        `PUT` replacement is not supported (`501 Not Implemented`) - use `PATCH`.
      requestBody:
        required: true
        content:
          application/scim+json:
            schema:
              $ref: "#/components/schemas/ScimPatchOp"
            example:
              schemas: ["urn:ietf:params:scim:api:messages:2.0:PatchOp"]
              Operations:
                - op: add
                  path: members
                  value:
                    - value: "101"
      responses:
        "200":
          description: The updated SCIM group.
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/ScimGroup"
        "400":
          description: The patch document is invalid.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: The credential is not bound to the directory given in the URL.
        "404":
          description: The group does not exist in the directory.
    delete:
      operationId: scimDeleteGroup
      security:
        - oauth2: []
      tags: [SCIM Provisioning]
      summary: Delete group (SCIM)
      description: Deletes the group. Only empty leaf groups can be deleted - a group with child groups or content, and the groups representing the subscription or the directory itself, are rejected.
      responses:
        "204":
          description: The group was deleted.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: The credential is not bound to the directory given in the URL.
        "404":
          description: The group does not exist in the directory.
        "409":
          description: The group cannot be deleted - it has child groups (only leaf groups can be deleted; verified), or it represents the subscription or the directory.

webhooks:
  metadocumentEvent:
    post:
      operationId: metadocumentEventWebhook
      tags: [Webhooks]
      summary: Metadocument changed
      description: |
        Plantyst calls the registered callback URL with a `POST` request whenever a metadocument is created, updated or deleted on a measurement accessible to the integration. Changes of comments and production entries are delivered as `MetadocumentUpdate` events carrying the whole document.

        The event is sent only after the change command finishes successfully (the `Success` command result).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookEvent"
            example:
              id: 0be9e2c6-6c53-4de1-8c39-0f2c81a4d7aa
              eventType: MetadocumentUpdate
              timestamp: 1783861200
              commandGuid: 21ef10c1-768b-48dc-b7a3-fd0e0a6e1102
              data:
                guid: 27a858a0-c244-4640-83f8-513dbc70c2e6
                measurementId: 3
                type: 3
                from: "2026-07-01T05:30:00Z"
                to: "2026-07-01T07:30:00Z"
                creatorId: 497
                color: "#969614"
                downtimeCodeKey: "144"
                downtimeCode:
                  code: "1.2"
                  title: Tool change
                eTag: "\"2f007274-0000-0d00-0000-6a4e18d80000\""
                lastModified: "2026-07-01T07:30:05Z"
                comments:
                  - id: 1
                    userId: 497
                    modificationTime: "2026-07-01T07:00:12Z"
                    text: Comment text
                customFields:
                  SourceId: ext-123
              configuration:
                Measurements: [3]
              authorization:
                authorizationType: Token
                value: "eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9..."
              appliedChanges: "[{\"op\":\"replace\",\"path\":\"/DowntimeCode\",\"value\":\"144\"}]"
      responses:
        "2XX":
          description: Return any `2xx` status code to acknowledge the delivery. Any other status code (or an unreachable URL) causes the delivery to be retried several times before it is dropped.

components:
  securitySchemes:
    oauth2:
      type: oauth2
      description: OAuth2 authorization code flow. Registration of the application (client_id, client_secret, redirect_uri) at support@plantyst.com.
      flows:
        authorizationCode:
          authorizationUrl: https://portal.plantyst.com/OAuth/Authorize
          tokenUrl: https://portal.plantyst.com/api/OAuth/Token
          refreshUrl: https://portal.plantyst.com/api/OAuth/Token
          scopes: {}
    basicApiKey:
      type: http
      scheme: basic
      description: "HTTP Basic authentication with the API key: username is the user's email, password is the API key."
    apiKeyHeader:
      type: apiKey
      in: header
      name: X-API-KEY
      description: The API key passed in a custom header.
    apiKeyQuery:
      type: apiKey
      in: query
      name: api_key
      description: The API key passed in the query string. Useful for quick tests, but avoid it in production integrations because URLs tend to end up in logs.

  parameters:
    ScimDirectoryId:
      name: directoryId
      in: path
      required: true
      schema:
        type: integer
      description: The identifier of the directory, assigned by Plantyst during the provisioning setup.

    CommandCustomId:
      name: commandCustomId
      in: query
      required: false
      schema:
        type: string
      description: Optional client-supplied identifier of the command. The command result can later be looked up by this identifier - metadocument commands with `GET /MetadocumentCommandResults?commandCustomId={id}`, other commands with `GET /commandResults?commandCustomId={id}`.

  schemas:
    AuthorizationCodeTokenRequest:
      type: object
      title: Authorization code
      required: [grant_type, code, redirect_uri, client_id, client_secret]
      properties:
        grant_type:
          type: string
          enum: [authorization_code]
        code:
          type: string
          description: Temporary authorization code from the first step.
        redirect_uri:
          type: string
          description: redirect_uri of the application.
        client_id:
          type: string
          description: client_id of the application.
        client_secret:
          type: string
          description: client_secret of the application.

    RefreshTokenRequest:
      type: object
      title: Refresh token
      required: [grant_type, refresh_token, client_id, client_secret]
      properties:
        grant_type:
          type: string
          enum: [refresh_token]
        refresh_token:
          type: string
          description: The refresh token returned with the previous access token.
        client_id:
          type: string
          description: client_id of the application.
        client_secret:
          type: string
          description: client_secret of the application.

    AuthorizationToken:
      type: object
      properties:
        token_type:
          type: string
          description: The type of the token; always "Bearer".
        access_token:
          type: string
          description: The JWT token used to authorize API requests.
        expires_in:
          type: integer
          description: The number of seconds until the access token expires.
        refresh_token:
          type: string
          description: The token used to obtain a new access token when the current one expires.

    OAuthError:
      type: object
      properties:
        error:
          type: string
          enum: [invalid_request, invalid_client, invalid_grant, unsupported_grant_type]

    ApiMessage:
      type: object
      properties:
        Message:
          type: string

    CommandLocation:
      type: object
      required: [location]
      properties:
        location:
          type: string
          description: The relative URL of the command-result resource. Always present in a successful `202` response.

    HalLink:
      type: object
      properties:
        href:
          type: string

    HalLinks:
      type: object
      description: HAL links of the resource. A relation with a single link is serialized as an object, a relation with multiple links as an array of link objects.
      additionalProperties: true

    MeasurementList:
      type: object
      properties:
        _links:
          type: object
          properties:
            self:
              $ref: "#/components/schemas/HalLink"
        _embedded:
          type: object
          properties:
            timezone:
              type: array
              description: Timezones referenced by the measurements.
              items:
                type: object
                properties:
                  id:
                    type: string
                    description: The time zone identifier.
                  name:
                    type: string
                    description: The time zone full name.
                  iana:
                    type: string
                    description: The time zone IANA code.
                  _links:
                    $ref: "#/components/schemas/HalLinks"
            tag:
              type: array
              description: Tags created and assigned to the measurements.
              items:
                type: object
                properties:
                  id:
                    type: string
                    description: The tag identifier.
                  title:
                    type: string
                    description: The tag title.
                  color:
                    type: string
                    description: The tag color represented as a hexadecimal color value.
                  _links:
                    $ref: "#/components/schemas/HalLinks"
            measurementDataVersion:
              type: array
              description: Versions of various measurement-related data.
              items:
                type: object
                properties:
                  id:
                    type: string
                    description: The data version identifier.
                  title:
                    type: string
                    description: The data type title.
                  lastModified:
                    type: string
                    format: date-time
                    description: The date and time of the last data modification.
                  _links:
                    $ref: "#/components/schemas/HalLinks"
            measurementCustomField:
              type: array
              description: Custom fields assigned to the measurements.
              items:
                type: object
                properties:
                  id:
                    type: integer
                    description: The custom field identifier.
                  key:
                    type: string
                    description: The custom field key.
                  value:
                    type: string
                    description: The custom field value.
                  _links:
                    $ref: "#/components/schemas/HalLinks"
            hierarchicalLocation:
              type: array
              description: Hierarchical locations of the measurements.
              items:
                type: object
                properties:
                  hierarchicalLocationId:
                    type: integer
                    description: The hierarchical location identifier.
                  title:
                    type: string
                    description: The location title.
                  shortTitle:
                    type: string
                    description: The location short title.
                  level:
                    type: string
                    description: |
                      The position of the location within the hierarchy tree, encoded as an opaque __materialized path__: a `/`-delimited string, wrapped in a leading and trailing slash, that is unique per location and gains one segment with each level of nesting (`/51/` for a top-level location, `/51/77/` for a location one level below it). Rebuild the tree by comparing these strings - see the endpoint description for the rules.
                    example: /51/77/
                  _links:
                    $ref: "#/components/schemas/HalLinks"
            measurement:
              type: array
              description: The array of Measurement objects.
              items:
                $ref: "#/components/schemas/Measurement"

    # Internal-only measurement properties, intentionally not documented
    # (returned by the API, but intended for the Portal frontend; third
    # parties should ignore them):
    # * shiftEndDowntimeAction - what happens to a downtime running at the end of a shift (Continue/Terminate/Split)
    # * isHierarchicalLocationHiddenInTitle - whether the hierarchical location prefix is hidden in the title
    Measurement:
      type: object
      properties:
        measurementId:
          type: integer
        title:
          type: string
          description: "The displayed title, composed as `{prefixLabel} {baseTitle}` (just the base title when no prefix is set). When several measurements of the customer account end up with the same composed title, a ` (n)` suffix is appended to distinguish them (numbered in the order of `measurementId`)."
        baseTitle:
          type: string
          description: The base title of the measurement - the value managed by the measurement lifecycle commands of the Measurements group.
        prefixLabel:
          type: [string, "null"]
          description: An optional prefix (typically a machine number) displayed before the base title; managed by the measurement lifecycle commands.
        commandGuid:
          type: string
          format: uuid
          description: The identifier of the command that created or last changed the measurement; expected as `OriginGuid` by the measurement update and archive commands - re-read the measurement before a change.
        description:
          type: string
        quantityType:
          type: string
          enum: [speed, rate, stroke, time, temperature, humidity, power, flow, workload, rotation]
        archived:
          type: boolean
        first:
          type: string
          format: date-time
        rights:
          type: array
          items:
            type: string
            enum: [View, Contributor, DataAdmin, Admin, Owner]
        _links:
          $ref: "#/components/schemas/HalLinks"

    UserSummary:
      type: object
      description: A user referenced from other resources (comment or production entry author, metadocument creator).
      properties:
        userId:
          type: integer
        name:
          type: string
        _links:
          $ref: "#/components/schemas/HalLinks"

    MetadocumentComment:
      type: object
      description: A comment of a metadocument.
      properties:
        id:
          type: integer
          description: The identifier of the comment and its version, unique within the metadocument. Updating a comment assigns it a new `id` - always re-read the metadocument to get the current `id` before a subsequent update or delete.
        text:
          type: string
          maxLength: 500
          description: The comment text; rendered as Markdown by the Portal and may contain user or team mentions (see the group description).
        modificationTime:
          type: string
          format: date-time
          description: UTC date and time of the last modification.
        _links:
          $ref: "#/components/schemas/HalLinks"

    ProductionEntry:
      type: object
      description: A record of a produced amount within a metadocument (typically a job).
      properties:
        id:
          type: integer
          description: The identifier of the production entry and its version, unique within the metadocument. Updating a production entry assigns it a new `id` - always re-read the metadocument to get the current `id` before a subsequent update or delete.
        time:
          type: string
          format: date-time
        value:
          type: number
          description: The produced amount.
        type:
          type: string
          maxLength: 100
          description: User-defined type of the entry (e.g. `OK`, `NOK`).
        note:
          type: string
          maxLength: 500
        reason:
          type: string
          description: The reason of the entry (e.g. why the amount was corrected).
        _links:
          $ref: "#/components/schemas/HalLinks"

    ProductionEntryCreate:
      type: object
      required: [Value]
      properties:
        Value:
          type: number
          description: The produced amount.
        Type:
          type: string
          maxLength: 100
          description: User-defined type of the entry (e.g. `OK`, `NOK`).
        Note:
          type: string
          maxLength: 500
        Time:
          type: string
          format: date-time
          description: The time of the entry. It must lie within the time range of the metadocument, otherwise the command finishes with the `DataError` result. When omitted, the current UTC time is used - for metadocuments in the past, always provide `Time` explicitly.
        Reason:
          type: string
          description: The reason of the entry (e.g. why the amount was corrected).

    Tool:
      type: object
      description: A tool used by the job.
      properties:
        customId:
          type: string
          description: User-defined identifier of the tool.

    PropertyLock:
      type: object
      description: A lock of a metadocument property. Locked properties can be modified only by the user who locked them or by a user with the Admin right.
      properties:
        propertyName:
          type: string
        userId:
          type: [integer, "null"]
          description: The user who locked the property.

    # Internal-only metadocument response properties, intentionally not documented
    # (returned by the API, but intended for the Portal frontend and internal
    # integrations; third parties should ignore them):
    # * eventSource, eventSourceId - identification of the external event that created the metadocument
    # * fromTimeAdjustment, toTimeAdjustment - automatic time adjustment rules ({rule, maximalShift, ruleTimeThreshold, isResolved})
    # * task - link to the related task entry ({id, initialTitle})
    # * links - internal links to external data sources ({id, linkType, prefetchJson}); when a
    #   ProductionEntries link exists, direct production entry modifications return 405
    Metadocument:
      type: object
      description: A metadocument returned by the API. Properties with `null` values are omitted in HAL responses.
      properties:
        guid:
          type: string
          format: uuid
        type:
          type: integer
          enum: [0, 1, 2, 3]
          description: "The metadocument type: 0 = general, 1 = annotation, 2 = job, 3 = downtime."
        title:
          type: string
        description:
          type: string
          description: Extended description; supports the Markdown markup language.
        customId:
          type: string
          description: User-defined identifier.
        creatorId:
          type: integer
          description: The identifier of the user who created the metadocument.
        measurementId:
          type: integer
        from:
          type: string
          format: date-time
        to:
          type: [string, "null"]
          format: date-time
          description: "`null` denotes an unlimited (still running) metadocument."
        lastModified:
          type: string
          format: date-time
        eTag:
          type: string
          description: The concurrency stamp of the metadocument; pass it to update/delete operations for the optimistic concurrency check.
        color:
          type: string
          description: Color in the hex color code.
        setpoint:
          type: number
          description: The desired value of the measured quantity during the metadocument.
        setpointQuantityType:
          type: string
          description: The quantity type of the setpoint.
        operations:
          type: array
          items:
            type: string
          description: Operations of the job, as an array of string values.
        downtimeCode:
          type: string
          description: Currently returns the same value as `downtimeCodeKey`. Use `downtimeCodeKey` instead; to obtain the human-readable code and its description, look the key up in the downtime code dictionary.
        downtimeCodeKey:
          type: string
          description: The key of the assigned downtime code (see the downtime code dictionary).
        workOrderNumber:
          type: string
        plannedFrom:
          type: string
          format: date-time
        plannedTo:
          type: string
          format: date-time
        plannedDuration:
          type: number
          description: The planned duration, in seconds.
        targetAmount:
          type: number
          description: The target production amount of the job.
        maximumProductionCoefficient:
          type: number
        currentProductionCoefficient:
          type: number
        maximumProductionCoefficientDenominator:
          type: number
        currentProductionCoefficientDenominator:
          type: number
        customFields:
          type: object
          additionalProperties: true
          description: User-defined key/value fields.
        readOnly:
          type: boolean
          description: When `true`, the metadocument cannot be modified.
        locks:
          type: array
          items:
            $ref: "#/components/schemas/PropertyLock"
        automaticTermination:
          type: boolean
          description: Determines whether the metadocument will be terminated automatically.
        tools:
          type: array
          items:
            $ref: "#/components/schemas/Tool"
        _links:
          $ref: "#/components/schemas/HalLinks"
        _embedded:
          type: object
          properties:
            comment:
              type: array
              items:
                $ref: "#/components/schemas/MetadocumentComment"
            productionEntry:
              type: array
              items:
                $ref: "#/components/schemas/ProductionEntry"
            user:
              type: array
              items:
                $ref: "#/components/schemas/UserSummary"

    # Internal-only create/update properties, intentionally not documented:
    # * EventSource, EventSourceId - identification of the source event (used by internal integrations)
    # * ReadOnly, Locks - read-only flag and property locks (managed by the Portal frontend)
    # * FromTimeAdjustment, ToTimeAdjustment - automatic time adjustment rules
    # * MetadocumentType - obsolete alias of Type
    # * DowntimeCode - writable alias of DowntimeCodeKey (both map to the same entity field);
    #   only DowntimeCodeKey is documented; the intended target state is that DowntimeCode
    #   becomes a read-only property resolved from the downtime code dictionary
    #   (improvement tracked in DOPORUCENI-API.md)
    MetadocumentCreate:
      type: object
      required: [MeasurementId, Type, From]
      properties:
        MeasurementId:
          type: integer
        Type:
          type: integer
          enum: [0, 1, 2, 3]
          description: "The metadocument type: 0 = general, 1 = annotation, 2 = job, 3 = downtime."
        From:
          type: string
          format: date-time
        To:
          type: [string, "null"]
          format: date-time
          description: Omit or set to `null` for an unlimited (still running) metadocument.
        Title:
          type: string
          description: The title of the metadocument (typically for jobs). For downtimes classified by a downtime code, leave the title empty and set only `DowntimeCodeKey` - the UI then displays the dictionary description of the code, and a later change of the description in the dictionary propagates to all downtimes.
        Description:
          type: string
          description: Extended description; supports the Markdown markup language.
        CustomId:
          type: string
          description: User-defined identifier. By default, at most one metadocument with the given `CustomId` per measurement is allowed (see the `allowMultiple` parameter).
        Text:
          type: string
          maxLength: 500
          description: When provided, the first comment of the metadocument is created with this text.
        CommentTime:
          type: string
          format: date-time
          description: The time of the first comment (used together with `Text`); when omitted, the current UTC time is used.
        Setpoint:
          type: number
          description: The desired value of the measured quantity during the metadocument.
        SetpointQuantityType:
          type: string
          description: The quantity type of the setpoint.
        Color:
          type: string
          description: Color in the hex color code.
        Operations:
          type: array
          items:
            type: string
          description: Operations of the job, as an array of string values.
        DowntimeCodeKey:
          type: string
          description: The key of the downtime code to assign (see the downtime code dictionary). For downtimes, set only this property and leave `Title` empty.
        WorkOrderNumber:
          type: string
        PlannedFrom:
          type: string
          format: date-time
        PlannedTo:
          type: string
          format: date-time
        PlannedDuration:
          type: number
          description: The planned duration, in seconds.
        TargetAmount:
          type: number
          description: The target production amount of the job.
        MaximumProductionCoefficient:
          type: number
        CurrentProductionCoefficient:
          type: number
        MaximumProductionCoefficientDenominator:
          type: number
        CurrentProductionCoefficientDenominator:
          type: number
        CustomFields:
          type: object
          additionalProperties: true
          description: User-defined key/value fields.
        AutomaticTermination:
          type: boolean
          description: Determines whether the metadocument will be terminated automatically.
        Tools:
          type: array
          items:
            $ref: "#/components/schemas/Tool"

    # Internal-only create/update properties: see the comment above MetadocumentCreate.
    MetadocumentUpdate:
      type: object
      description: Only the properties present in the payload are changed.
      properties:
        ETag:
          type: string
          description: The concurrency stamp for the optimistic concurrency check; when the metadocument has been modified in the meantime, the command finishes with the `Conflict` result.
        Title:
          type: string
        From:
          type: string
          format: date-time
        To:
          type: [string, "null"]
          format: date-time
          description: Set to `null` for an unlimited (still running) metadocument.
        Description:
          type: string
          description: Extended description; supports the Markdown markup language.
        CustomId:
          type: string
        Color:
          type: string
          description: Color in the hex color code.
        Setpoint:
          type: number
        Operations:
          type: array
          items:
            type: string
        DowntimeCodeKey:
          type: string
          description: The key of the downtime code to assign (see the downtime code dictionary). For downtimes, set only this property and leave `Title` empty.
        WorkOrderNumber:
          type: string
        PlannedFrom:
          type: string
          format: date-time
        PlannedTo:
          type: string
          format: date-time
        PlannedDuration:
          type: number
          description: The planned duration, in seconds.
        TargetAmount:
          type: number
        MaximumProductionCoefficient:
          type: number
        CurrentProductionCoefficient:
          type: number
        MaximumProductionCoefficientDenominator:
          type: number
        CurrentProductionCoefficientDenominator:
          type: number
        CustomFields:
          type: object
          additionalProperties: true
        AutomaticTermination:
          type: boolean
        Tools:
          type: array
          items:
            $ref: "#/components/schemas/Tool"

    MetadocumentCommandResult:
      type: object
      properties:
        guid:
          type: string
          format: uuid
          description: Unique identifier of the metadocument command.
        result:
          type: string
          enum: [Waiting, InProgress, Success, Conflict, DataError, Failed, AlreadyApplied]
          description: The state of the command (see the Metadocuments group description).
        createdDate:
          type: [string, "null"]
          format: date-time
          description: UTC date and time when the command was created.
        processedDate:
          type: string
          format: date-time
          description: UTC date and time when the command was processed.
        metadocumentGuid:
          type: string
          description: The identifier of the related metadocument.
        _links:
          $ref: "#/components/schemas/HalLinks"

    JobType:
      type: object
      description: A planned job (a "job type" in the API contract) - one job of the job plan imported through the CSV import. Properties with `null` values are omitted in HAL responses.
      properties:
        jobTypeId:
          type: integer
          description: The identifier of the planned job. It is NOT stable across imports - every CSV import replaces the job plan and assigns new identifiers. To correlate the planned jobs with an external system, use `WorkOrderNumber` or a `Custom.`-prefixed field instead.
        title:
          type: string
        setpoint:
          type: [number, "null"]
          description: The desired production speed during the job.
        measurementId:
          type: integer
        plannedFrom:
          type: [string, "null"]
          format: date-time
        plannedTo:
          type: [string, "null"]
          format: date-time
        isPermanent:
          type: boolean
          description: Permanent planned jobs stay available in the job plan.
        currentState:
          type: string
          enum: [Available, Running, Paused, Finished]
        maximumProductionCoefficient:
          type: [number, "null"]
        maximumProductionCoefficientDenominator:
          type: [number, "null"]
        order:
          type: [integer, "null"]
          description: The position of the planned job in the job plan (the order of rows in the imported file).
        commandGuid:
          type: string
          format: uuid
          description: The identifier of the import command that created the planned job.
        description:
          type: [string, "null"]
        operations:
          type: [array, "null"]
          items:
            type: string
        availableTools:
          type: [array, "null"]
          items:
            type: string
        targetAmount:
          type: [number, "null"]
          description: The target production amount of the job.
        customFields:
          type: [object, "null"]
          additionalProperties: true
          description: User-defined key/value fields imported from the `Custom.`-prefixed CSV columns.
        workOrderNumber:
          type: [string, "null"]
        completedDate:
          type: [string, "null"]
          format: date-time
          description: The date when the job has been completed.
        multipleInstanceId:
          type: [string, "null"]
          description: The identifier grouping multiple instances of the same job.
        isMultipleInstanceOverlapDisabled:
          type: [boolean, "null"]
          description: Determines whether the instances of the job cannot run concurrently.
        _links:
          $ref: "#/components/schemas/HalLinks"

    CommandResult:
      type: object
      properties:
        guid:
          type: string
          format: uuid
          description: Unique identifier of the command.
        result:
          type: string
          enum: [Waiting, InProgress, Success, Conflict, DataError, Failed, AlreadyApplied]
          description: The state of the command (see the Command Results group description).
        reason:
          type: [string, "null"]
          description: The description of the problem when the command failed (e.g. with the `DataError` result).
        createdDate:
          type: [string, "null"]
          format: date-time
          description: UTC date and time when the command was created.
        processedDate:
          type: string
          format: date-time
          description: UTC date and time when the command was processed.
        _links:
          $ref: "#/components/schemas/HalLinks"


    # Internal-only downtime code properties, intentionally not documented
    # (returned by the API, but intended for the Portal frontend):
    # * severity - Undefined/Minor/Major/Critical classification of the cause
    # * order - the position of the code in the list offered to operators
    DowntimeCode:
      type: object
      description: A downtime code from the dictionary. Properties with `null` values are omitted in HAL responses.
      properties:
        downtimeCodeId:
          type: integer
        key:
          type: string
          description: Server-assigned identifier of the code, referenced by downtime metadocuments (`downtimeCodeKey`).
        code:
          type: string
          maxLength: 10
          description: Short human-readable code displayed in the UI.
        title:
          type: string
          description: The description of the downtime cause.
        color:
          type: [string, "null"]
          description: Color in the hex color code.
        validTo:
          type: [string, "null"]
          format: date-time
          description: Soft-delete timestamp; `null` for active codes.
        commandGuid:
          type: string
          format: uuid
          description: The identifier of the command that created or last changed the code; used as `OriginGuids` in the management commands.
        canBeSelected:
          type: boolean
        maxLength:
          type: [integer, "null"]
          description: The maximal length of the downtime in seconds; a longer downtime is automatically split.
        isBreakdown:
          type: [boolean, "null"]
        isCommentRequired:
          type: [boolean, "null"]
        isTransferable:
          type: [boolean, "null"]
        isShiftPauseTransferable:
          type: [boolean, "null"]
        isReducingPlannedTime:
          type: [boolean, "null"]
        isReducingProduction:
          type: [boolean, "null"]
        isReducingProductionTime:
          type: [boolean, "null"]
        _links:
          $ref: "#/components/schemas/HalLinks"

    # Internal-only write properties (accepted, but intended for the Portal
    # frontend): Severity, Order - see the comment above DowntimeCode.
    DowntimeCodeWrite:
      type: object
      required: [Code, Title]
      properties:
        Code:
          type: string
          maxLength: 10
          pattern: '^([a-zA-Z0-9]+\.?)+$'
          description: Short human-readable code displayed in the UI.
        Title:
          type: string
          description: The description of the downtime cause.
        Color:
          type: string
          description: Color in the hex color code.
        CanBeSelected:
          type: boolean
        IsBreakdown:
          type: boolean
        IsCommentRequired:
          type: boolean
        IsTransferable:
          type: boolean
        IsShiftPauseTransferable:
          type: boolean
        IsReducingPlannedTime:
          type: boolean
        IsReducingProduction:
          type: boolean
        IsReducingProductionTime:
          type: boolean
        MaxLength:
          type: integer
          description: The maximal length of the downtime in seconds; a longer downtime is automatically split.


    PauseInterval:
      type: object
      description: A pause within a shift, expressed as offsets from the shift start in the `[dd.]hh:mm:ss` format.
      properties:
        from:
          type: string
          description: The offset of the pause start from the shift start.
        to:
          type: string
          description: The offset of the pause end from the shift start.

    PauseIntervalWrite:
      type: object
      description: A pause within a shift, expressed as offsets from the shift start in the `[dd.]hh:mm:ss` format.
      properties:
        From:
          type: string
          description: The offset of the pause start from the shift start.
        To:
          type: string
          description: The offset of the pause end from the shift start.

    CalendarEvent:
      type: object
      description: A calendar event - a shift (`PlannedProduction`) or a planned shutdown (`PlannedShutdown`). Properties with `null` values are omitted in HAL responses.
      properties:
        eventType:
          type: string
          enum: [PlannedProduction, PlannedShutdown]
        measurementId:
          type: integer
        start:
          type: string
          format: date-time
          description: The start of the event; its Unix timestamp is the event identifier.
        end:
          type: string
          format: date-time
        guid:
          type: string
          format: uuid
          description: The identifier of the command that created or last changed the event; used as `OriginGuid` in the management operations.
        title:
          type: [string, "null"]
        shiftName:
          type: [string, "null"]
        shiftType:
          type: [string, "null"]
          description: User-defined shift type label.
        pauses:
          type: array
          items:
            $ref: "#/components/schemas/PauseInterval"
        plannedOperatorAssignment:
          type: [number, "null"]
          description: The planned number of assigned operators.
        effectiveOperatorAssignment:
          type: [number, "null"]
          description: The effective number of assigned operators.
        overtime:
          type: boolean
        _links:
          $ref: "#/components/schemas/HalLinks"
          description: Besides `self`, the event carries an `operators` link relation pointing to the users assigned to the shift; their user objects are embedded at the list level (`_embedded.user`).

    CalendarEventList:
      type: object
      properties:
        hasDataAdminAccessRightDictionary:
          type: object
          additionalProperties:
            type: boolean
          description: For every queried measurement, whether the current user has the DataAdmin right (i.e. can manage its calendar).
        _links:
          $ref: "#/components/schemas/HalLinks"
        _embedded:
          type: object
          properties:
            event:
              type: array
              items:
                $ref: "#/components/schemas/CalendarEvent"
            user:
              type: array
              description: The operators assigned to the returned shifts (referenced from the events through their `operators` link relation).
              items:
                $ref: "#/components/schemas/UserSummary"

    CalendarOperatorCommand:
      type: object
      required: [MeasurementId, Id, OriginGuid, UserId]
      properties:
        MeasurementId:
          type: integer
        Id:
          type: string
          description: The event identifier (the Unix timestamp of the shift start).
        OriginGuid:
          type: string
          format: uuid
          description: The current `guid` of the event.
        UserId:
          type: integer
          description: The identifier of the operator (user).


    WebhookAuthorization:
      type: object
      description: A short-lived credential (valid for 1 hour) for calling the REST API as the integration user.
      properties:
        authorizationType:
          type: string
          enum: [Token, ApiKey]
          description: "`Token` - use the value as a bearer token; `ApiKey` - use the value as an API key."
        value:
          type: string

    WebhookComment:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: [integer, "null"]
        modificationTime:
          type: string
          format: date-time
        text:
          type: string

    WebhookProductionEntry:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: [integer, "null"]
        time:
          type: string
          format: date-time
        value:
          type: number
        type:
          type: string
        note:
          type: [string, "null"]

    # Internal-only properties observed in webhook payloads, intentionally not
    # documented: maximalLength (seconds, derived from the downtime code),
    # nextCommentId, nextProductionEntryId (internal counters).
    WebhookMetadocument:
      type: object
      description: The metadocument carried by the webhook. All metadocument properties (see the Metadocuments group) are present in camelCase; properties with `null` or empty values are omitted. Unlike the REST representation, the related records are inlined (no `_links`/`_embedded`).
      additionalProperties: true
      properties:
        deleted:
          type: boolean
          description: Present with the value `true` on `MetadocumentDelete` events.
        guid:
          type: string
          format: uuid
        measurementId:
          type: integer
        type:
          type: integer
          enum: [0, 1, 2, 3]
          description: "The metadocument type: 0 = general, 1 = annotation, 2 = job, 3 = downtime."
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
        eTag:
          type: string
        lastModified:
          type: string
          format: date-time
        color:
          type: [string, "null"]
          description: Color in the hex color code.
        downtimeCodeKey:
          type: [string, "null"]
          description: The key of the assigned downtime code.
        downtimeCode:
          type: [object, "null"]
          description: The assigned downtime code resolved from the dictionary. Note that unlike the REST representation (where `downtimeCode` is a string with the key), the webhook carries an object with the human-readable code and its description.
          properties:
            code:
              type: string
            title:
              type: string
        comments:
          type: array
          items:
            $ref: "#/components/schemas/WebhookComment"
        productionEntries:
          type: array
          items:
            $ref: "#/components/schemas/WebhookProductionEntry"
        customFields:
          type: object
          additionalProperties: true

    WebhookEvent:
      type: object
      description: The body of a webhook delivery. Properties with `null` values are omitted.
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier of this delivery.
        eventType:
          type: string
          enum: [MetadocumentCreate, MetadocumentUpdate, MetadocumentDelete]
        timestamp:
          type: integer
          description: Unix timestamp (in seconds) when the event was raised.
        commandGuid:
          type: string
          format: uuid
          description: The identifier of the command that caused the change; equals the command identifier from the `location` URL returned to the API caller.
        data:
          $ref: "#/components/schemas/WebhookMetadocument"
        configuration:
          description: The per-integration configuration agreed during the webhook setup, echoed with every delivery (any JSON value; omitted when not configured).
        authorization:
          $ref: "#/components/schemas/WebhookAuthorization"
        appliedChanges:
          type: string
          description: "A JSON Patch (RFC 6902) document (as a string) describing the changes applied by the command. The paths use PascalCase property names (e.g. `/To`, `/DowntimeCode`, `/Comments/0`), unlike the camelCase payload. Special shapes: a create event carries a single `replace` of the path `/` with the whole document, a delete event a `replace` of `/` with `null`."


    # Internal-only property of /Users/Me, intentionally not documented:
    # * features - UI feature toggles of the user ({title, configuration, enabledUntil})
    UserProfile:
      type: object
      description: The full profile of the token owner.
      properties:
        userId:
          type: integer
        name:
          type: string
        email:
          type: string
        language:
          type: [string, "null"]
          description: The preferred language of the user (e.g. `cs-CZ`).
        _links:
          $ref: "#/components/schemas/HalLinks"

    # Internal-only property, intentionally not documented:
    # * features - enabled subscription modules ({title, configuration, enabledUntil})
    Subscription:
      type: object
      properties:
        subscriptionId:
          type: integer
        title:
          type: string
        name:
          type: string
        isArchived:
          type: boolean
        _links:
          $ref: "#/components/schemas/HalLinks"


    ScimMeta:
      type: object
      properties:
        created:
          type: [string, "null"]
          format: date-time
        lastModified:
          type: [string, "null"]
          format: date-time

    ScimUser:
      type: object
      description: A SCIM 2.0 user. The `Role` and `ManagedType` properties are Plantyst extensions (note their PascalCase names). Unlike the HAL endpoints, the SCIM responses include properties with `null` values.
      required: [userName]
      properties:
        schemas:
          type: array
          items:
            type: string
          description: "Always `[\"urn:ietf:params:scim:schemas:core:2.0:User\"]` - the extension URN is not listed even though the extension properties are present."
        id:
          type: string
          description: The SCIM identifier; equals the Plantyst `userId`. Assigned by the server.
        userName:
          type: string
          description: The e-mail (login) of the user.
        displayName:
          type: string
        name:
          type: object
          properties:
            givenName:
              type: string
            familyName:
              type: string
        locale:
          type: [string, "null"]
          description: "The language of the user; supported values: `en-US`, `cs-CZ`, `en-GB` (case-insensitive; other values are rejected). When omitted on create, the directory default is used."
        phoneNumbers:
          type: array
          items:
            type: object
            properties:
              primary:
                type: boolean
              type:
                type: string
              value:
                type: string
        active:
          type: boolean
          description: Setting `active` to `false` deactivates the user.
        Role:
          type: [string, "null"]
          description: Plantyst extension - the Plantyst role of the user. Read-only. Note the PascalCase name.
        ManagedType:
          type: string
          enum: [Managed, Unmanaged]
          description: Plantyst extension - whether the user is managed by this directory. Read-only. Note the PascalCase name.
        meta:
          $ref: "#/components/schemas/ScimMeta"

    ScimGroup:
      type: object
      description: A SCIM 2.0 group, mapping to a Plantyst group - the primary organizational structure. The group hierarchy (built with `parentGroupDisplayName`) can serve as the hierarchy for measurements (see the group description). The `shortName` and `parentGroupDisplayName` properties are Plantyst extensions (`urn:ietf:params:scim:schemas:extension:plantyst:1.0:Group`).
      required: [displayName]
      properties:
        schemas:
          type: array
          items:
            type: string
          description: "`urn:ietf:params:scim:schemas:core:2.0:Group` and the Plantyst extension `urn:ietf:params:scim:schemas:extension:plantyst:1.0:Group`."
        id:
          type: string
          description: The SCIM identifier; equals the group identifier used elsewhere in the API (`groupId`, `hierarchicalLocationId`). Assigned by the server.
        displayName:
          type: string
        members:
          type: array
          items:
            type: object
            properties:
              value:
                type: string
                description: The SCIM user identifier of the member.
        shortName:
          type: [string, "null"]
          description: Plantyst extension - a short label of the group. The `displayName` must be unique and therefore tends to be long; `shortName` is used instead of it where space matters (e.g. in hierarchical path displays showing the whole chain of groups). When not set, the `displayName` is used.
        parentGroupDisplayName:
          type: [string, "null"]
          description: Plantyst extension - the display name of the parent group (it must exist in the directory); when omitted on create, the group is created under the directory root group. Change it with a PATCH operation to move the group under a different parent.
        meta:
          $ref: "#/components/schemas/ScimMeta"

    ScimUserListResponse:
      type: object
      description: "A SCIM `ListResponse` with user resources. Note the PascalCase `Resources` key (per RFC 7644) next to the camelCase counters."
      properties:
        schemas:
          type: array
          items:
            type: string
          description: Always `["urn:ietf:params:scim:api:messages:2.0:ListResponse"]`.
        totalResults:
          type: integer
        itemsPerPage:
          type: integer
        startIndex:
          type: integer
        Resources:
          type: array
          items:
            $ref: "#/components/schemas/ScimUser"

    ScimGroupListResponse:
      type: object
      description: "A SCIM `ListResponse` with group resources. Note the PascalCase `Resources` key (per RFC 7644) next to the camelCase counters."
      properties:
        schemas:
          type: array
          items:
            type: string
          description: Always `["urn:ietf:params:scim:api:messages:2.0:ListResponse"]`.
        totalResults:
          type: integer
        itemsPerPage:
          type: integer
        startIndex:
          type: integer
        Resources:
          type: array
          items:
            $ref: "#/components/schemas/ScimGroup"

    ScimPatchOp:
      type: object
      description: A SCIM 2.0 PatchOp message.
      required: [Operations]
      properties:
        schemas:
          type: array
          items:
            type: string
          description: Always `["urn:ietf:params:scim:api:messages:2.0:PatchOp"]`.
        Operations:
          type: array
          items:
            type: object
            required: [op]
            properties:
              op:
                type: string
                enum: [add, replace, remove]
              path:
                type: string
              value:
                description: The value of the operation (any JSON value).


    MetricsQueryPayload:
      type: object
      required: [Queries]
      properties:
        Queries:
          type: array
          items:
            type: object
            required: [MeasurementId, From, To]
            properties:
              MeasurementId:
                type: integer
              From:
                type: string
                format: date-time
              To:
                type: string
                format: date-time
              MaximumCount:
                type: integer
                description: The maximum count of metrics to return.

    Metric:
      type: object
      properties:
        name:
          type: string
        value:
          type: [number, "null"]
          description: The value of the metric; `null` when it cannot be computed.

    MetricsQueryResult:
      type: object
      properties:
        results:
          type: array
          items:
            type: object
            properties:
              query:
                type: object
                description: The copy of the original query.
                properties:
                  measurementId:
                    type: integer
                  from:
                    type: string
                    format: date-time
                  to:
                    type: string
                    format: date-time
                  maximumCount:
                    type: integer
              results:
                type: array
                items:
                  $ref: "#/components/schemas/Metric"

    Tag:
      type: object
      properties:
        id:
          type: string
          description: The tag identifier (returned as a string).
        title:
          type: string
        color:
          type: string
          description: "The HTML color of the tag (e.g. `#3498DB`)."
        _links:
          $ref: "#/components/schemas/HalLinks"

    TaskEntryList:
      type: object
      description: The HAL list of tasks with the related users and metadocuments.
      properties:
        _links:
          $ref: "#/components/schemas/HalLinks"
        _embedded:
          type: object
          properties:
            taskEntry:
              type: array
              items:
                $ref: "#/components/schemas/TaskEntry"
            user:
              type: array
              items:
                type: object
                description: The users referenced by the tasks and their metadocuments.
            metadocument:
              type: array
              items:
                type: object
                description: The metadocuments the tasks belong to (see Metadocuments).

    TaskEntry:
      type: object
      properties:
        id:
          type: string
          description: The task identifier.
        title:
          type: string
        metadocumentGuid:
          type: string
          format: uuid
          description: The metadocument the task is attached to.
        commandGuid:
          type: string
          format: uuid
          description: The identifier of the command that created or last changed the task; expected as `OriginGuid` by the update and delete commands.
        createdDate:
          type: string
          format: date-time
        completedDate:
          type: [string, "null"]
          format: date-time
          description: The completion time; `null` for an open task.
        dueDate:
          type: [string, "null"]
          format: date-time
          description: The planned date of the task.
        deadline:
          type: [string, "null"]
          format: date-time
          description: The latest date the task should be finished.
        _links:
          $ref: "#/components/schemas/HalLinks"
        _embedded:
          type: object
          description: The embedded users (and the metadocument on the single-task endpoint).

  responses:
    Unauthorized:
      description: Authorization has been denied for this request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiMessage"
          example:
            Message: Authorization has been denied for this request.
    Forbidden:
      description: Forbidden.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiMessage"
          example:
            Message: Forbidden.
    NotFound:
      description: Not Found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiMessage"
          example:
            Message: Not Found.
    CommandAccepted:
      description: The command was accepted. The body contains the relative URL of the command result.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CommandLocation"
          example:
            location: api/commandResults/5ad8938c-21dc-4b51-9b2c-3a8bfb2b816d
    MetadocumentCommandAccepted:
      description: The relative URL with the result of the requested operation.
      content:
        application/hal+json:
          schema:
            $ref: "#/components/schemas/CommandLocation"
          example:
            location: Api/MetadocumentCommandResults/b2ec82f2-1438-47cd-a982-6b2e3b0476c7
